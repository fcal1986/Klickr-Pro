              style="flex:1;padding:10px 12px;border-radius:10px;border:2px solid ${(ex.timeDir||'desc')==='asc'?'#3b82f6':'#e5e7eb'};background:${(ex.timeDir||'desc')==='asc'?'#eff6ff':'#f8fafc'};cursor:pointer;text-align:center">
              <div style="font-size:18px">🏃</div>
              <div style="font-size:12px;font-weight:800;color:${(ex.timeDir||'desc')==='asc'?'#3b82f6':'#475569'};margin-top:4px">Kürzeste Zeit</div>
              <div style="font-size:10px;color:#94a3b8;margin-top:2px">Sprint, Reaktion</div>
            </div>
            <div data-exTimedir="${tpl.id},${i}" data-dir="desc"
              style="flex:1;padding:10px 12px;border-radius:10px;border:2px solid ${(ex.timeDir||'desc')==='desc'?'#3b82f6':'#e5e7eb'};background:${(ex.timeDir||'desc')==='desc'?'#eff6ff':'#f8fafc'};cursor:pointer;text-align:center">
              <div style="font-size:18px">🏅</div>
              <div style="font-size:12px;font-weight:800;color:${(ex.timeDir||'desc')==='desc'?'#3b82f6':'#475569'};margin-top:4px">Längste Zeit</div>
              <div style="font-size:10px;color:#94a3b8;margin-top:2px">Ausdauer, Plank</div>
            </div>
          </div>
        </div>` : ''}
        <label>Standard-Foto</label>
        <select data-exPhoto="${tpl.id},${i}">
          ${PHOTOS.map(p=>`<option value="${p.id}" ${p.id===ex.exPhotoId?'selected':''}>${p.label}</option>`).join('')}
        </select>
        <label>📸 Übungsbilder (max. 5)</label>
        <div class="ex-img-grid">
          ${imgIds.map(id=>`<div class="ex-thumb-wrap">
            <img src="${_imgCache.get(id)||''}" data-load-th="${id}" data-open-lb="${tpl.id}|${ex.id}|${id}" loading="lazy"/>
            <button class="ex-thumb-del" data-del-img="${tpl.id}|${ex.id}|${id}">✕</button>
          </div>`).join('')}
          ${imgIds.length<5?`<button class="ex-add-photo-btn" data-add-ex-photo="${tpl.id}|${ex.id}">➕</button>`:''}
        </div>
      </div>`;
    });

    html += `<button data-addEx="${tpl.id}">➕ Übung hinzufügen</button>
      <div class="row" style="margin-top:12px">
        <button data-newTr="${tpl.id}">🚀 Training starten</button>
        <button class="danger" data-delTpl="${tpl.id}">🗑 Löschen</button>
      </div>
      </div></div>`; // close body + card
  });

  host.innerHTML = html;

  // Toggle individual template
  $$('[data-tpl-toggle]').forEach(row => {
    row.onclick = () => {
      const id = row.getAttribute('data-tpl-toggle');
      if (_tplExpanded.has(id)) _tplExpanded.delete(id); else _tplExpanded.add(id);
      renderTemplates(host);
    };
  });

  // Expand/collapse all
  $('tplExpandAll').onclick = () => { state.templates.forEach(t => _tplExpanded.add(t.id)); renderTemplates(host); };
  $('tplCollapseAll').onclick = () => { _tplExpanded.clear(); renderTemplates(host); };
  $('tplSortAZ').onclick = () => { _tplSort = 'az'; renderTemplates(host); };
  $('tplSortZA').onclick = () => { _tplSort = 'za'; renderTemplates(host); };

  // Lazy-load exercise thumbnails
  $$('[data-load-th]').forEach(async img => {
    const id = img.getAttribute('data-load-th');
    const src = _imgCache.get(id) || await cachedThumb(id);
    if (src) { img.src=src; _imgCache.set(id,src); }
  });

  // Lightbox from template view
  $$('[data-open-lb]').forEach(img => {
    img.onclick = () => {
      const [tplId,exId,imgId] = img.getAttribute('data-open-lb').split('|');
      const tpl = state.templates.find(t=>t.id===tplId);
      const ex = tpl?.exercises.find(e=>e.id===exId);
      if (ex) openLightbox(ex.customImgIds, ex.customImgIds.indexOf(imgId));
    };
  });

  $$('[data-add-ex-photo]').forEach(btn => { btn.onclick=()=>{ const[tplId,exId]=btn.getAttribute('data-add-ex-photo').split('|'); triggerExPhotoUpload(tplId,exId); }; });
  $$('[data-del-img]').forEach(btn => { btn.onclick=()=>{ const[tplId,exId,imgId]=btn.getAttribute('data-del-img').split('|'); if(confirm('Bild löschen?')) deleteExPhoto(tplId,exId,imgId); }; });

  // ── Drag & Drop Reihenfolge ──
  let dragSrc = null;
  $$('.ex-drag-item').forEach(item => {
    item.addEventListener('dragstart', e => { dragSrc=item; item.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    item.addEventListener('dragend',   () => { item.classList.remove('dragging'); $$('.ex-drag-item').forEach(i=>i.classList.remove('drag-over')); });
    item.addEventListener('dragover',  e => { e.preventDefault(); if(item!==dragSrc){$$('.ex-drag-item').forEach(i=>i.classList.remove('drag-over'));item.classList.add('drag-over');} });
    item.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragSrc || dragSrc===item) return;
      const tplId=dragSrc.getAttribute('data-drag-tpl'), fromIdx=+dragSrc.getAttribute('data-drag-idx'), toIdx=+item.getAttribute('data-drag-idx');
      const tpl=state.templates.find(t=>t.id===tplId); if(!tpl) return;
      const [moved]=tpl.exercises.splice(fromIdx,1); tpl.exercises.splice(toIdx,0,moved);
      save(); renderTemplates(host);
    });
  });

  $('addTpl')?.addEventListener('click', () => {
    const name=prompt('Template Name:','Neues Template'); if(!name) return;
    const id='tpl_'+uid();
    state.templates.push({id,name,exercises:[{id:'ex_'+uid(),title:'Übung 1',type:'reps',restSec:60,hint:'',exPhotoId:'e1',customImgIds:[]}]});
    _tplExpanded.add(id); // auto-expand new template
    save(); renderTemplates(host);
  });
  $$('[data-tplName]').forEach(inp=>{inp.oninput=()=>{const t=state.templates.find(t=>t.id===inp.getAttribute('data-tplName'));if(t){t.name=inp.value;save();}};});
  $$('[data-exTitle]').forEach(inp=>{inp.oninput=()=>{const[tid,i]=inp.getAttribute('data-exTitle').split(',');const t=state.templates.find(t=>t.id===tid);if(t?.exercises[i]){t.exercises[i].title=inp.value;save();}};});
  $$('[data-exType]').forEach(sel=>{sel.onchange=()=>{
    const[tid,i]=sel.getAttribute('data-exType').split(',');
    const t=state.templates.find(t=>t.id===tid);
    if(t?.exercises[i]){
      t.exercises[i].type=sel.value;
      // Neues timeDir setzen wenn noch nicht vorhanden
      if(sel.value==='time' && !t.exercises[i].timeDir) t.exercises[i].timeDir='asc';
      save(); renderTemplates(host); // Re-render um timeDir-Toggle zu zeigen/verbergen
    }
  };});
  $$('[data-exRest]').forEach(inp=>{inp.oninput=()=>{const[tid,i]=inp.getAttribute('data-exRest').split(',');const t=state.templates.find(t=>t.id===tid);if(t?.exercises[i]){t.exercises[i].restSec=parseInt(inp.value)||0;save();}};});
  $$('[data-exPhoto]').forEach(sel=>{sel.onchange=()=>{const[tid,i]=sel.getAttribute('data-exPhoto').split(',');const t=state.templates.find(t=>t.id===tid);if(t?.exercises[i]){t.exercises[i].exPhotoId=sel.value;save();}};});
  // timeDir Toggle (Sprint = asc, Ausdauer = desc)
  $$('[data-exTimedir]').forEach(btn=>{btn.onclick=()=>{
    const[tid,i]=btn.getAttribute('data-exTimedir').split(',');
    const t=state.templates.find(t=>t.id===tid);
    if(t?.exercises[i]){ t.exercises[i].timeDir=btn.getAttribute('data-dir'); save(); renderTemplates(host); }
  };});
  $$('[data-delEx]').forEach(btn=>{btn.onclick=()=>{const[tid,i]=btn.getAttribute('data-delEx').split(',');const t=state.templates.find(t=>t.id===tid);if(t&&t.exercises.length>1&&confirm('Übung löschen?')){t.exercises.splice(+i,1);save();renderTemplates(host);}};});
  $$('[data-addEx]').forEach(btn=>{btn.onclick=()=>{const t=state.templates.find(t=>t.id===btn.getAttribute('data-addEx'));if(t){t.exercises.push({id:'ex_'+uid(),title:'Neue Übung',type:'reps',restSec:60,hint:'',exPhotoId:'e1',customImgIds:[]});save();renderTemplates(host);}};});
  $$('[data-newTr]').forEach(btn=>{btn.onclick=()=>{createTraining(btn.getAttribute('data-newTr'));state.tab='tracking';save();render();};});
  $$('[data-delTpl]').forEach(btn=>{btn.onclick=()=>{if(!confirm('Template löschen?'))return;const id=btn.getAttribute('data-delTpl');state.templates=state.templates.filter(t=>t.id!==id);_tplExpanded.delete(id);save();renderTemplates(host);};});
}

// ================================================================
// RENDER ATHLETES – collapsible list with sort
// ================================================================
let _athSort = 'az'; // 'az' | 'za'
let _athExpanded = new Set(); // IDs of expanded athletes
let _grpExpanded = new Set(); // IDs of expanded groups (default: alle offen)

async function renderAthletes(host) {
  // ── Player card grid ──
  const sorted = [...state.athletes].sort((a,b) =>
    _athSort === 'az' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name)
  );
  const cardGridHtml = await renderPlayerCardGrid(sorted, { showActive: true, selectedId: state.athId });

  // ── Gruppen-Sektion HTML ──
  let groupsHtml = '';
  if (state.groups.length === 0) {
    groupsHtml = `<div style="text-align:center;padding:20px 0;color:#94a3b8;font-size:13px">
      Noch keine Gruppen. Tippe auf „Neue Gruppe" um loszulegen.
    </div>`;
  } else {
    // Alphabetisch sortiert
    const sortedGroups = [...state.groups].sort((a, b) => a.name.localeCompare(b.name));

    sortedGroups.forEach(g => {
      const col      = groupColor(g.colorId);
      const isActive = state.activeGroupId === g.id;
      const isOpen   = _grpExpanded.has(g.id);
      const members  = g.athleteIds.map(id => state.athletes.find(a=>a.id===id)).filter(Boolean);

      // Athleten-Pills
      const pills = state.athletes.map(a => {
        const checked = g.athleteIds.includes(a.id);
        const src = _imgCache.get(a.photoId) || a.photo || DEFAULT_AVATAR;
        return `<div class="group-ath-pill ${checked?'checked':''}" data-grp-pill="${g.id}" data-pill-ath="${a.id}">
          <img src="${src}" data-lazy-grp-pill="${a.id}"/>
          ${esc(a.name)}
        </div>`;
      }).join('');

      groupsHtml += `
      <div class="group-card" style="border-color:${isActive ? col.hex : '#e5e7eb'};padding:0;overflow:hidden">

        <!-- ── Kopfzeile (immer sichtbar, Klick = auf-/zuklappen) ── -->
        <div data-grp-toggle="${g.id}"
          style="display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;
                 background:${isActive ? col.hex + '12' : '#fff'}">

          <!-- Farbpunkt (groß, gut sichtbar) -->
          <div style="width:16px;height:16px;border-radius:50%;background:${col.hex};flex-shrink:0;
                      box-shadow:0 0 0 3px ${col.hex}30"></div>

          <!-- Gruppenname -->
          <div style="flex:1;min-width:0">
            <div style="font-weight:900;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
              ${esc(g.name)}
            </div>
            <div style="font-size:11px;color:#64748b;margin-top:2px">
              ${members.length} Athlet${members.length!==1?'en':''}
              ${isActive ? `<span style="color:${col.hex};font-weight:800"> · Aktiv</span>` : ''}
            </div>
          </div>

          <!-- Aktiv-Button -->
          <button class="small" data-grp-activate="${g.id}"
            style="background:${isActive ? col.hex : '#f1f5f9'};color:${isActive?'#fff':'#475569'};
                   border:none;min-height:28px;padding:3px 10px;font-size:11px;font-weight:800;
                   border-radius:999px;flex-shrink:0"
            onclick="event.stopPropagation()">
            ${isActive ? '✓ Aktiv' : 'Aktivieren'}
          </button>

          <!-- Chevron -->
          <span style="font-size:16px;color:#9ca3af;transition:.2s;
                       transform:${isOpen?'rotate(180deg)':'rotate(0deg)'};flex-shrink:0">▾</span>
        </div>

        <!-- ── Ausgeklappter Bereich ── -->
        <div style="display:${isOpen ? 'block' : 'none'};padding:0 16px 16px;border-top:1px solid #f1f5f9">

          <!-- Zeile 1: Gruppenname bearbeiten -->
          <div style="margin-top:12px">
            <label style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;
                           letter-spacing:.5px;margin-bottom:4px;display:block">Gruppenname</label>
            <input value="${esc(g.name)}" data-grp-name="${g.id}"
              style="width:100%;font-weight:800;font-size:15px;border:1.5px solid #e2e8f0;
                     border-radius:10px;padding:8px 12px;background:#f8fafc;box-sizing:border-box"/>
          </div>

          <!-- Zeile 2: Farbauswahl -->
          <div style="margin-top:12px">
            <label style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;
                           letter-spacing:.5px;margin-bottom:8px;display:block">Farbe</label>
            <div style="display:flex;gap:10px;flex-wrap:wrap">
              ${GROUP_COLORS.map(c => `
                <div class="group-color-dot" data-grp-color="${g.id}" data-color="${c.id}"
                  style="width:28px;height:28px;border-radius:50%;background:${c.hex};cursor:pointer;
                         border:3px solid ${g.colorId===c.id ? '#1e293b' : 'transparent'};
                         box-shadow:${g.colorId===c.id ? '0 0 0 2px #fff inset' : 'none'};
                         transition:.15s;flex-shrink:0"
                  title="${c.id}"></div>`).join('')}
            </div>
          </div>

          <!-- Zeile 3: Athleten zuweisen -->
          <div style="margin-top:14px">
            <label style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;
                           letter-spacing:.5px;margin-bottom:8px;display:block">Athleten in dieser Gruppe</label>
            <div class="group-ath-check">${pills}</div>
          </div>

          <!-- Zeile 4: Löschen -->
          <button class="danger" data-grp-del="${g.id}"
            style="margin-top:14px;font-size:13px;padding:10px">
            🗑 Gruppe löschen
          </button>
        </div>
      </div>`;
    });
  }

  let html = `
  <div class="leaderboard-wrap">
    <div class="leaderboard-title" style="font-size:18px;margin-bottom:12px">Meine Athleten</div>
    ${cardGridHtml}
  </div>

  <!-- ── GRUPPEN ── -->
  <div class="card">
    <div class="sec-head" style="margin-bottom:14px">
      <span>🏷️ Gruppen</span>
      <div style="display:flex;gap:6px">
        <button class="small" id="grpExpandAll" style="background:#f1f5f9;color:#475569;font-size:11px;min-height:28px;padding:3px 8px">⬇ Alle</button>
        <button class="small" id="grpCollapseAll" style="background:#f1f5f9;color:#475569;font-size:11px;min-height:28px;padding:3px 8px">⬆ Alle</button>
        <button class="small" id="addGroup">➕ Neu</button>
      </div>
    </div>
    <div id="groupsList">${groupsHtml}</div>
  </div>

  <!-- ── ATHLETEN-VERWALTUNG ── -->
  <div class="card">
    <h2>⚙️ Athleten-Verwaltung</h2>
    <button id="addAth" style="margin-top:12px">➕ Neuer Athlet</button>
    <div class="row" style="margin-top:12px;gap:8px">
      <button class="small" id="athExpandAll">⬇ Alle ausklappen</button>
      <button class="small" id="athCollapseAll">⬆ Alle einklappen</button>
    </div>
    <div class="row" style="margin-top:8px;gap:8px">
      <button class="small ${_athSort==='az'?'':'secondary'}" id="athSortAZ" style="${_athSort==='az'?'':'background:#e5e7eb;color:#374151'}">A → Z</button>
      <button class="small ${_athSort==='za'?'':'secondary'}" id="athSortZA" style="${_athSort==='za'?'':'background:#e5e7eb;color:#374151'}">Z → A</button>
    </div>
  </div>`;

  sorted.forEach(a => {
    const active   = state.activeIds.includes(a.id);
    const avatarSrc = _imgCache.get(a.photoId) || a.photo || DEFAULT_AVATAR;
    const expanded  = _athExpanded.has(a.id);

    // Welche Gruppen hat dieser Athlet?
    const athGroups = state.groups.filter(g => g.athleteIds.includes(a.id));
    const groupPills = athGroups.map(g => {
      const col = groupColor(g.colorId);
      return `<span style="background:${col.hex};color:#fff;font-size:10px;font-weight:800;padding:1px 7px;border-radius:999px">${esc(g.name)}</span>`;
    }).join('');

    html += `<div class="card" style="padding:0;overflow:hidden">
      <div data-ath-toggle="${a.id}" style="display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none">
        <img src="${avatarSrc}" data-lazy-ath-detail="${a.id}"
          style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:3px solid ${active?'#10b981':'#e5e7eb'};flex-shrink:0"/>
        <div style="flex:1;min-width:0">
          <div style="font-weight:900;font-size:15px">${esc(a.name)}</div>
          <div style="font-size:11px;color:#6b7280;margin-top:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap">
            <span>${active?'✅ Aktiv':'⏸ Inaktiv'}</span>
            ${groupPills}
          </div>
        </div>
        <span style="font-size:18px;color:#9ca3af;transition:.2s;transform:${expanded?'rotate(180deg)':'rotate(0deg)'};display:block">▾</span>
      </div>
      <div style="display:${expanded?'block':'none'};padding:0 16px 16px">
        <div class="ath-photo-wrap">
          <img src="${avatarSrc}" data-lazy-ath-detail2="${a.id}" alt="${esc(a.name)}"/>
          <button class="ath-photo-btn" data-photo-upload="${a.id}" title="Foto aus Galerie wählen">📷</button>
        </div>
        <label>Name</label><input value="${esc(a.name)}" data-athName="${a.id}"/>
        <label>Foto URL (optional)</label>
        <input value="${esc(a.photo||'')}" data-athPhoto="${a.id}" placeholder="https://..."/>
        <div class="row" style="margin-top:12px">
          <button data-toggle="${a.id}">${active?'⏸ Deaktivieren':'✅ Aktivieren'}</button>
          <button class="danger" data-delAth="${a.id}">🗑 Löschen</button>
        </div>
      </div>
    </div>`;
  });

  host.innerHTML = html;

  // ── Lazy-load Athleten-Bilder ──
  $$('[data-lazy-ath-detail],[data-lazy-ath-detail2]').forEach(async img => {
    const id = img.getAttribute('data-lazy-ath-detail') || img.getAttribute('data-lazy-ath-detail2');
    const a  = state.athletes.find(x=>x.id===id);
    if (a?.photoId) { const src = await cachedThumb(a.photoId); if(src) img.src=src; }
  });
  $$('[data-lazy-grp-pill]').forEach(async img => {
    const a = state.athletes.find(x=>x.id===img.getAttribute('data-lazy-grp-pill'));
    if (a?.photoId) { const src = await cachedThumb(a.photoId); if(src) img.src=src; }
  });

  // ── Gruppen Event-Handler ──

  // Gruppe auf-/zuklappen
  $$('[data-grp-toggle]').forEach(row => {
    row.onclick = () => {
      const id = row.getAttribute('data-grp-toggle');
      if (_grpExpanded.has(id)) _grpExpanded.delete(id); else _grpExpanded.add(id);
      renderAthletes(host);
    };
  });

  // Alle Gruppen auf-/zuklappen
  const grpExpandAll = $('grpExpandAll');
  const grpCollapseAll = $('grpCollapseAll');
  if (grpExpandAll) grpExpandAll.onclick = () => {
    state.groups.forEach(g => _grpExpanded.add(g.id));
    renderAthletes(host);
  };
  if (grpCollapseAll) grpCollapseAll.onclick = () => {
    _grpExpanded.clear();
    renderAthletes(host);
  };

  const addGroupBtn = $('addGroup');
  if (addGroupBtn) addGroupBtn.onclick = () => {
    const name = prompt('Gruppenname:', 'Gruppe ' + (state.groups.length + 1));
    if (!name?.trim()) return;
    // Nächste freie Farbe wählen
    const usedColors = state.groups.map(g => g.colorId);
    const freeColor  = GROUP_COLORS.find(c => !usedColors.includes(c.id))?.id || 'blue';
    createGroup(name.trim(), freeColor);
    renderAthletes(host);
  };

  // Gruppen-Name live ändern
  $$('[data-grp-name]').forEach(inp => {
    inp.oninput = () => {
      const g = state.groups.find(x => x.id === inp.getAttribute('data-grp-name'));
      if (g) { g.name = inp.value; save(); }
    };
  });

  // Farbe wählen
  $$('[data-grp-color]').forEach(dot => {
    dot.onclick = () => {
      const g = state.groups.find(x => x.id === dot.getAttribute('data-grp-color'));
      if (!g) return;
      g.colorId = dot.getAttribute('data-color');
      save(); renderAthletes(host);
    };
  });

  // Gruppe aktivieren
  $$('[data-grp-activate]').forEach(btn => {
    btn.onclick = () => {
      const gid = btn.getAttribute('data-grp-activate');
      if (state.activeGroupId === gid) {
        activateAllAthletes();
      } else {
        activateGroup(gid);
      }
      renderAthletes(host);
    };
  });

  // Gruppe löschen
  $$('[data-grp-del]').forEach(btn => {
    btn.onclick = () => {
      const g = state.groups.find(x => x.id === btn.getAttribute('data-grp-del'));
      if (!g || !confirm(`Gruppe "${g.name}" löschen?`)) return;
      deleteGroup(g.id);
      renderAthletes(host);
    };
  });

  // Athlet zu Gruppe hinzufügen / entfernen (Pill-Toggle)
  $$('[data-grp-pill]').forEach(pill => {
    pill.onclick = () => {
      const gid  = pill.getAttribute('data-grp-pill');
      const aid  = pill.getAttribute('data-pill-ath');
      const g    = state.groups.find(x => x.id === gid);
      if (!g) return;
      const idx = g.athleteIds.indexOf(aid);
      if (idx >= 0) g.athleteIds.splice(idx, 1);
      else          g.athleteIds.push(aid);
      // Wenn diese Gruppe aktiv ist → activeIds sofort aktualisieren
      if (state.activeGroupId === gid) activateGroup(gid);
      else save();
      renderAthletes(host);
    };
  });

  // ── Athleten-Verwaltung Event-Handler (unverändert) ──
  $$('[data-ath-toggle]').forEach(row => {
    row.onclick = () => {
      const id = row.getAttribute('data-ath-toggle');
      if (_athExpanded.has(id)) _athExpanded.delete(id); else _athExpanded.add(id);
      renderAthletes(host);
    };
  });
  $('athExpandAll').onclick  = () => { state.athletes.forEach(a => _athExpanded.add(a.id)); renderAthletes(host); };
  $('athCollapseAll').onclick = () => { _athExpanded.clear(); renderAthletes(host); };
  $('athSortAZ').onclick = () => { _athSort = 'az'; renderAthletes(host); };
  $('athSortZA').onclick = () => { _athSort = 'za'; renderAthletes(host); };

  $$('[data-photo-upload]').forEach(btn => {
    btn.onclick = e => { e.stopPropagation(); triggerAthPhotoUpload(btn.getAttribute('data-photo-upload')); };
  });

  $('addAth')?.addEventListener('click', () => {
    const name = prompt('Name:', 'Athlet ' + (state.athletes.length + 1)); if (!name) return;
    const a = { id: 'ath_'+uid(), name, photo: '', photoId: '' };
    state.athletes.push(a); state.activeIds.push(a.id);
    _athExpanded.add(a.id);
    save(); renderAthletes(host);
  });

  $$('[data-athName]').forEach(inp  => { inp.oninput = () => { const a=state.athletes.find(x=>x.id===inp.getAttribute('data-athName'));  if(a){a.name=inp.value;save();} }; });
  $$('[data-athPhoto]').forEach(inp => { inp.oninput = () => { const a=state.athletes.find(x=>x.id===inp.getAttribute('data-athPhoto')); if(a){a.photo=inp.value;save();} }; });
  $$('[data-toggle]').forEach(btn   => {
    btn.onclick = () => {
      const id = btn.getAttribute('data-toggle');
      const i  = state.activeIds.indexOf(id);
      if (i >= 0) state.activeIds.splice(i, 1); else state.activeIds.push(id);
      save(); renderAthletes(host);
    };
  });
  $$('[data-delAth]').forEach(btn => {
    btn.onclick = () => {
      if (!confirm('Athlet löschen?')) return;
      const id = btn.getAttribute('data-delAth');
      const a  = state.athletes.find(x=>x.id===id);
      if (a?.photoId) { imgDelete('thumbs',a.photoId); imgDelete('full',a.photoId); _imgCache.delete(a.photoId); }
      state.athletes  = state.athletes.filter(x=>x.id!==id);
      state.activeIds = state.activeIds.filter(x=>x!==id);
      // Athlet aus allen Gruppen entfernen
      state.groups.forEach(g => { g.athleteIds = g.athleteIds.filter(x=>x!==id); });
      _athExpanded.delete(id);
      if (state.athId===id) state.athId = state.activeIds[0]||'';
      save(); renderAthletes(host);
    };
  });
}

// ================================================================
// RENDER SYSTEM – vollständiger Export/Import inkl. Bilder
// ================================================================
function renderSystem(host) {
  host.innerHTML=`<div class="card">
    <h2>⚙️ System & Export</h2>

    <h3 style="margin:20px 0 10px">📄 PDF Export</h3>
    <button id="pdfSingle">📄 Aktuelles Training als PDF</button>

    <h3 style="margin:20px 0 10px">💾 Vollständiges Backup</h3>
    <p style="font-size:13px;color:#6b7280;margin-bottom:8px">Exportiert alle Daten inkl. Fotos. Kann vollständig re-importiert werden.</p>
    <button id="exportFull">💾 Backup exportieren</button>
    <div id="exportProgress" style="display:none;margin-top:10px;padding:12px;background:#f0f4ff;border-radius:12px;font-size:13px;color:#374151;line-height:1.6"></div>

    <h3 style="margin:20px 0 10px">📥 Backup importieren</h3>
    <p style="font-size:13px;color:#6b7280;margin-bottom:8px">Stellt ein vollständiges Backup wieder her. Alle aktuellen Daten werden überschrieben.</p>
    <button id="importData">📥 Backup importieren</button>
    <input type="file" id="importFile" accept=".json,.txt" style="display:none"/>
    <div id="importProgress" style="display:none;margin-top:8px;padding:12px;background:#f0f4ff;border-radius:12px;font-size:13px;color:#374151;line-height:1.6"></div>

    <h3 style="margin:20px 0 10px">🔄 Reset</h3>
    <button class="danger" id="reset">🗑 Alles zurücksetzen</button>

    <h3 style="margin:20px 0 10px">🐛 Debug-Mode</h3>
    <p style="font-size:13px;color:#6b7280;margin-bottom:8px">Zeigt verfügbare APIs und testet Export-Methoden.</p>
    <button id="runDebug" style="background:#7c3aed">🔍 Debug starten</button>
    <div id="debugOut" style="display:none;margin-top:10px;background:#1a1a2e;color:#a0f0a0;border-radius:12px;padding:14px;font-family:monospace;font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-all;max-height:60vh;overflow-y:auto"></div>

    <h3 style="margin:20px 0 10px">ℹ️ App Info</h3>
    <div style="background:#f0f4ff;border-radius:12px;padding:12px;font-size:13px;color:#374151">
      <div><strong>Version:</strong> ${APP_VERSION}</div>
      <div style="margin-top:4px"><strong>Athleten:</strong> ${state.athletes.length}</div>
      <div style="margin-top:4px"><strong>Gruppen:</strong> ${(state.groups||[]).length}</div>
      <div style="margin-top:4px"><strong>Templates:</strong> ${state.templates.length}</div>
      <div style="margin-top:4px"><strong>Trainings:</strong> ${state.trainings.length}</div>
      <div style="margin-top:4px"><strong>Einträge gesamt:</strong> ${
        state.trainings.reduce((sum,tr)=>sum+Object.values(tr.records||{}).reduce((s,r)=>s+r.length,0),0)
      }</div>
    </div>
  </div>`;

  // PDF Export
  $('pdfSingle').onclick = () => {
    const tr=state.trainings.find(t=>t.id===state.trainId);const ath=state.athletes.find(a=>a.id===state.athId);
    if(!tr||!ath)return alert('Kein Training/Athlet ausgewählt');
    const{jsPDF}=window.jspdf;const doc=new jsPDF();
    doc.setFontSize(18);doc.text(`Training: ${tr.tplName}`,14,20);
    doc.setFontSize(12);doc.text(`Athlet: ${ath.name}`,14,28);doc.text(`Datum: ${fmtDate(tr.date)}`,14,34);
    if(tr.note)doc.text(`Notiz: ${tr.note}`,14,40);
    let y=tr.note?48:44;
    tr.exercises.forEach(ex=>{const key=`${ath.id}_${ex.id}`;const recs=tr.records[key]||[];if(!recs.length)return;
      doc.setFontSize(14);doc.text(`${ex.title} (${ex.type})`,14,y);y+=8;
      const rows=recs.map(r=>{let v=ex.type==='reps'?r.value:ex.type==='lr'?`L:${r.left} R:${r.right}`:r.value+'s';return[fmtTime(r.ts),v,r.note||''];});
      doc.autoTable({startY:y,head:[['Zeit','Wert','Notiz']],body:rows,theme:'grid',styles:{fontSize:10},margin:{left:14}});
      y=doc.lastAutoTable.finalY+10;if(y>270){doc.addPage();y=20;}
    });
    doc.save(`training_${ath.name}_${tr.date}.pdf`);
  };

  // ── Vollständiger Export inkl. Bilder ──
  $('exportFull').onclick = async () => {
    const prog = $('exportProgress');
    prog.style.display = 'block';
    prog.style.color = '#6b7280';
    prog.textContent = '⏳ Sammle Daten...';

    try {
      // Collect ALL image IDs
      const allImgIds = new Set();
      state.athletes.forEach(a => { if(a.photoId) allImgIds.add(a.photoId); });
      state.templates.forEach(tpl => tpl.exercises?.forEach(ex => (ex.customImgIds||[]).forEach(id=>allImgIds.add(id))));
      state.trainings.forEach(tr => tr.exercises?.forEach(ex => (ex.customImgIds||[]).forEach(id=>allImgIds.add(id))));

      const ids = [...allImgIds];
      const images = {};
      for (let i = 0; i < ids.length; i++) {
        prog.textContent = `⏳ Exportiere Fotos... ${i+1}/${ids.length}`;
        const id    = ids[i];
        const thumb = await imgLoad('thumbs', id);
        const full  = await imgLoad('full',   id);
        if (thumb || full) images[id] = { thumb: thumb||null, full: full||null };
      }

      prog.textContent = '⏳ Erstelle Backup-Datei...';
      const backup = {
        version:  APP_VERSION,
        exported: new Date().toISOString(),
        appName:  'Kickr Training PRO',
        state:    state,
        images:   images
      };
      const json     = JSON.stringify(backup);
      // Median/Android WebView: .json wird blockiert ("no app to open") → .txt verwenden
      const isMedianWebView = /median/i.test(navigator.userAgent) || (/Android/.test(navigator.userAgent) && /wv\)/.test(navigator.userAgent));
      const ext      = isMedianWebView ? 'txt' : 'json';
      const mimeType = isMedianWebView ? 'text/plain' : 'application/json';
      const blob     = new Blob([json], {type: mimeType});
      const filename = `kickr_backup_${today()}.${ext}`;
      const sizeMB   = (blob.size/1024/1024).toFixed(1);

      // ── Methode 1: File System Access API – nur echter Desktop ──
      if (window.showSaveFilePicker && !isMedianWebView) {
        try {
          const fh = await window.showSaveFilePicker({
            suggestedName: filename,
            startIn: 'downloads',
            types: [{ description: 'JSON Backup', accept: {'application/json': ['.json']} }]
          });
          const ws = await fh.createWritable();
          await ws.write(blob);
          await ws.close();
          prog.innerHTML = `<span style="color:#10b981;font-weight:700">✅ Gespeichert: ${filename} (${sizeMB} MB)</span>`;
          setTimeout(()=>prog.style.display='none', 6000);
          return;
        } catch(err) {
          if (err.name === 'AbortError') { prog.style.display='none'; return; }
          // Nicht unterstützt → weiter
        }
      }

      // ── Methode 2: Web Share mit Datei ──
      const shareFile = new File([blob], filename, {type:'application/json'});
      if (!isMedianWebView && navigator.canShare && navigator.canShare({ files: [shareFile] })) {
        try {
          await navigator.share({ title: 'Kickr Backup', files: [shareFile] });
          prog.innerHTML = `<span style="color:#10b981;font-weight:700">✅ Backup geteilt (${sizeMB} MB)</span>`;
          setTimeout(()=>prog.style.display='none', 6000);
          return;
        } catch(err) {
          if (err.name === 'AbortError') { prog.style.display='none'; return; }
        }
      }

      // ── Methode 3: GitHub Gist → median.share.downloadFile (Android/Median) ──
      // Das Backup wird als temporärer (secret) Gist hochgeladen.
      // Die raw_url endet auf den echten Dateinamen → Median speichert korrekt in Downloads.
      // Voraussetzung: GitHub Personal Access Token (nur "gist" Scope nötig).
      // Einmalig erstellen: github.com/settings/tokens → "gist" anhaken → Token kopieren.
      if (isMedianWebView) {
        const GITHUB_TOKEN = 'GITHUB_TOKEN_PLACEHOLDER'; // ← deinen GitHub Token hier eintragen

        if (GITHUB_TOKEN.includes('PLACEHOLDER')) {
          prog.style.display = 'block';
          prog.innerHTML = `
            <div style="color:#ef4444;font-weight:700;margin-bottom:8px">⚠️ GitHub Token fehlt</div>
            <div style="font-size:12px;color:#374151;line-height:1.6">
              1. github.com/settings/tokens → "Generate new token (classic)"<br>
              2. Nur <strong>"gist"</strong> Scope anhaken<br>
              3. Token in index.html bei <code>GITHUB_TOKEN_PLACEHOLDER</code> eintragen
            </div>
          `;
          return;
        }

        prog.textContent = '⏳ Lade Backup hoch...';
        try {
          // Backup als secret Gist hochladen
          const gistRes = await fetch('https://api.github.com/gists', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${GITHUB_TOKEN}`,
              'Accept': 'application/vnd.github+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              description: `Kickr Backup ${today()}`,
              public: false,
              files: {
                [filename]: { content: json }
              }
            })
          });

          if (!gistRes.ok) throw new Error('Gist Upload fehlgeschlagen: ' + gistRes.status);
          const gistData = await gistRes.json();
          const gistId   = gistData.id;
          // raw_url endet auf /raw/.../kickr_backup_YYYY-MM-DD.json → korrekter Dateiname
          const rawUrl   = gistData.files[filename].raw_url;

          prog.textContent = '⏳ Starte Download...';

          if (window.median?.share?.downloadFile) {
            await window.median.share.downloadFile({ url: rawUrl, open: false });
            prog.style.display = 'block';
            prog.innerHTML = `<div style="color:#10b981;font-weight:700">✅ ${filename} gespeichert in Downloads (${sizeMB} MB)</div>`;
            setTimeout(()=>prog.style.display='none', 6000);
          } else {
            window.open(rawUrl, '_blank');
            prog.innerHTML = `<div style="color:#10b981;font-weight:700">✅ Download gestartet: ${filename}</div>`;
            setTimeout(()=>prog.style.display='none', 6000);
          }

          // Gist nach 10 Minuten automatisch löschen (Best-Effort)
          setTimeout(() => {
            fetch(`https://api.github.com/gists/${gistId}`, {
              method: 'DELETE',
              headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}` }
            }).catch(()=>{});
          }, 600000);

          return;
        } catch(uploadErr) {
          // Fallback: Data-URL Link anzeigen
          prog.style.display = 'block';
          prog.innerHTML = `
            <div style="color:#f59e0b;font-weight:700;margin-bottom:8px">⚠️ Upload fehlgeschlagen: ${uploadErr.message}</div>
            <a href="data:application/octet-stream;base64,${btoa(unescape(encodeURIComponent(json)))}" download="${filename}"
               style="display:block;background:#10b981;color:#fff;padding:14px;border-radius:12px;font-weight:900;text-align:center;text-decoration:none">
              📥 ${filename} (${sizeMB} MB)
            </a>
          `;
          return;
        }
      }

      // ── Methode 4: Blob-Link (Desktop-Fallback) ──
      const dlUrl = URL.createObjectURL(blob);
      prog.style.display = 'block';
      prog.innerHTML = `
        <div style="font-weight:700;color:#10b981;margin-bottom:8px">✅ Backup bereit (${sizeMB} MB)</div>
        <a href="${dlUrl}" download="${filename}"
           style="display:block;background:#10b981;color:#fff;padding:14px 16px;border-radius:12px;font-weight:900;font-size:15px;text-align:center;text-decoration:none;margin-bottom:8px">
          📥 ${filename}
        </a>
      `;
      setTimeout(() => URL.revokeObjectURL(dlUrl), 600000);

    } catch(err) {
      prog.style.color = '#ef4444';
      prog.textContent = '❌ Export fehlgeschlagen: ' + err.message;
      console.error('Export error:', err);
    }
  };

  // ── Vollständiger Import inkl. Bilder ──
  $('importData').onclick = () => {
    // Reset input so same file can be selected again
    $('importFile').value = '';
    $('importFile').click();
  };

  $('importFile').onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    const prog = $('importProgress');
    prog.style.display = 'block';
    prog.textContent = '⏳ Lese Datei...';

    try {
      const text = await file.text();

      let rawText = text.trim();
      // Strip clipboard wrapper if present (from share/clipboard export)
      if (rawText.startsWith('KICKR_BACKUP_START')) {
        rawText = rawText.replace(/^KICKR_BACKUP_START\n?/, '').replace(/\nKICKR_BACKUP_END$/, '').trim();
      }

      let backup;
      try {
        backup = JSON.parse(rawText);
      } catch(parseErr) {
        throw new Error('Datei ist kein gültiges JSON (' + parseErr.message + ')');
      }

      // Support all formats:
      // v4.0: { version:'4.0', state:{...}, images:{...}, exported }
      // v3.0/v2.0: { version, state:{...}, exported }
      // legacy direct export: { athletes, trainings, templates, ... }
      let restoredState = null;

      if (backup && typeof backup === 'object') {
        if (backup.state && typeof backup.state === 'object') {
          restoredState = backup.state;
        } else if (backup.athletes !== undefined || backup.trainings !== undefined || backup.templates !== undefined) {
          restoredState = backup; // raw state object
        }
      }

      if (!restoredState) {
        throw new Error(`Unbekanntes Format. Gefundene Keys: ${Object.keys(backup||{}).join(', ') || '(leer)'}`);
      }

      // Validate minimum required fields
      if (!Array.isArray(restoredState.athletes) && !Array.isArray(restoredState.trainings) && !Array.isArray(restoredState.templates)) {
        throw new Error('Backup enthält keine Athleten, Trainings oder Templates');
      }

      const exportDate = backup.exported
        ? new Date(backup.exported).toLocaleDateString('de-DE')
        : 'unbekannt';
      const version  = backup.version || '?';
      const athCount = (restoredState.athletes||[]).length;
      const trCount  = (restoredState.trainings||[]).length;
      const tplCount = (restoredState.templates||[]).length;
      const grpCount = (restoredState.groups||[]).length;
      const imgCount = backup.images ? Object.keys(backup.images).length : 0;

      if (!confirm(
        `Backup v${version} vom ${exportDate} importieren?\n\n` +
        `📊 Inhalt:\n` +
        `  • ${athCount} Athleten\n` +
        `  • ${grpCount} Gruppen\n` +
        `  • ${trCount} Trainings\n` +
        `  • ${tplCount} Templates\n` +
        `  • ${imgCount} Fotos\n\n` +
        `⚠️ Alle aktuellen Daten werden überschrieben!`
      )) {
        prog.style.display = 'none';
        return;
      }

      // Restore state — sicherstellen dass groups vorhanden ist
      prog.textContent = '⏳ Stelle Daten wieder her...';
      state = restoredState;
      if (!state.groups)        state.groups = [];
      if (!state.activeGroupId) state.activeGroupId = '';
      save();

      // Restore images
      if (backup.images && imgCount > 0) {
        const imgIds = Object.keys(backup.images);
        for (let i = 0; i < imgIds.length; i++) {
          prog.textContent = `⏳ Stelle Fotos wieder her... ${i+1}/${imgIds.length}`;
          const id  = imgIds[i];
          const img = backup.images[id];
          if (!img) continue;
          try {
            if (img.thumb) { await imgSave('thumbs', id, img.thumb); _imgCache.set(id, img.thumb); }
            if (img.full)  { await imgSave('full',   id, img.full); }
          } catch(imgErr) {
            console.warn('Bild konnte nicht wiederhergestellt werden:', id, imgErr);
          }
        }
      }

      prog.textContent = `✅ Import erfolgreich! (${athCount} Athleten, ${grpCount} Gruppen, ${trCount} Trainings, ${imgCount} Fotos) – App wird neu geladen...`;
      setTimeout(() => location.reload(), 2000);

    } catch(err) {
      prog.textContent = '❌ Import fehlgeschlagen: ' + err.message;
      console.error('Import error:', err);
    }
  };

  $('reset').onclick = () => {
    if (!confirm('⚠️ ALLES löschen inkl. aller Fotos und Daten?')) return;
    try{localStorage.clear();}catch{}
    try{indexedDB.deleteDatabase(DB_NAME);}catch{}
    try{indexedDB.deleteDatabase(IMG_DB_NAME);}catch{}
    location.reload();
  };

  // ── Debug Mode ──
  $('runDebug').onclick = async () => {
    const out = $('debugOut');
    out.style.display = 'block';
    out.textContent = '';

    const log = (msg, color) => {
      const line = document.createElement('div');
      line.textContent = msg;
      if (color) line.style.color = color;
      out.appendChild(line);
      out.scrollTop = out.scrollHeight;
    };

    const ok  = msg => log('✅ ' + msg, '#a0f0a0');
    const err = msg => log('❌ ' + msg, '#f87171');
    const inf = msg => log('ℹ️  ' + msg, '#93c5fd');
    const sep = ()  => log('─────────────────────────', '#444');

    log('🐛 KICKR DEBUG v4.0', '#f9d94e');
    log(new Date().toLocaleString('de-DE'), '#9ca3af');
    sep();

    // ── Browser / WebView Info ──
    inf('USER AGENT:');
    log(navigator.userAgent, '#e0e0e0');
    sep();

    // ── API Availability ──
    log('📡 API VERFÜGBARKEIT', '#f9d94e');
    window.showSaveFilePicker   ? ok('showSaveFilePicker') : err('showSaveFilePicker (nicht verfügbar)');
    navigator.share             ? ok('navigator.share') : err('navigator.share (nicht verfügbar)');
    navigator.canShare          ? ok('navigator.canShare') : err('navigator.canShare (nicht verfügbar)');
    window.URL?.createObjectURL ? ok('URL.createObjectURL') : err('URL.createObjectURL (nicht verfügbar)');
    window.Blob                 ? ok('Blob') : err('Blob (nicht verfügbar)');
    window.File                 ? ok('File') : err('File (nicht verfügbar)');
    window.FileReader           ? ok('FileReader') : err('FileReader (nicht verfügbar)');
    window.indexedDB            ? ok('indexedDB') : err('indexedDB (nicht verfügbar)');
    window.localStorage         ? ok('localStorage') : err('localStorage (nicht verfügbar)');
    sep();

    // ── Test: canShare with file ──
    log('🔗 SHARE-FILE TEST', '#f9d94e');
    if (navigator.canShare) {
      try {
        const testBlob = new Blob(['test'], {type:'application/json'});
        const testFile = new File([testBlob], 'test.json', {type:'application/json'});
        const canShare = navigator.canShare({ files: [testFile] });
        canShare ? ok('canShare({ files }) = true → Share mit Datei möglich') : err('canShare({ files }) = false');
      } catch(e) { err('canShare Test Fehler: ' + e.message); }
    } else {
      err('navigator.canShare nicht vorhanden');
    }
    sep();

    // ── Test: Blob + ObjectURL ──
    log('📦 BLOB / OBJECT-URL TEST', '#f9d94e');
    try {
      const testBlob = new Blob([JSON.stringify({test:true})], {type:'application/json'});
      inf('Blob erstellt: ' + testBlob.size + ' bytes');
      const url = URL.createObjectURL(testBlob);
      inf('ObjectURL: ' + url.substring(0, 60) + '...');
      URL.revokeObjectURL(url);
      ok('Blob + ObjectURL funktioniert');
    } catch(e) { err('Blob/ObjectURL Fehler: ' + e.message); }
    sep();

    // ── Test: <a download> click ──
    log('⬇️  DOWNLOAD-LINK TEST (Mini-Datei)', '#f9d94e');
    const isMedian = /median/i.test(navigator.userAgent) || (/Android/.test(navigator.userAgent) && /wv\)/.test(navigator.userAgent));
    isMedian ? ok('Android WebView / Median erkannt → Data-URL Methode wird verwendet') : inf('Kein Android WebView – Blob-URL wird verwendet');
    try {
      const testJson = '{"debug":true,"test":"kickr"}';
      // Test beide Methoden
      const base64 = btoa(unescape(encodeURIComponent(testJson)));
      const dataUrl = `data:application/octet-stream;base64,${base64}`;
      const blobUrl = URL.createObjectURL(new Blob([testJson], {type:'application/json'}));

      const a1 = document.createElement('a');
      a1.href = dataUrl; a1.download = 'kickr_test_dataurl.json';
      a1.style.cssText = 'display:block;background:#10b981;color:#fff;padding:10px;border-radius:8px;text-align:center;text-decoration:none;margin:6px 0;font-weight:700';
      a1.textContent = '⬇️ Test via Data-URL (für Android) – hier tippen!';
      out.appendChild(a1);

      const a2 = document.createElement('a');
      a2.href = blobUrl; a2.download = 'kickr_test_bloburl.json';
      a2.style.cssText = 'display:block;background:#3b82f6;color:#fff;padding:10px;border-radius:8px;text-align:center;text-decoration:none;margin:6px 0;font-weight:700';
      a2.textContent = '⬇️ Test via Blob-URL (für Desktop) – hier tippen!';
      out.appendChild(a2);

      inf('→ Tippe auf BEIDE Links. Welcher landet in Downloads?');
      setTimeout(() => URL.revokeObjectURL(blobUrl), 300000);
    } catch(e) { err('Download-Link Fehler: ' + e.message); }
    sep();

    // ── Test: IDB State ──
    log('🗄️  INDEXEDDB TEST', '#f9d94e');
    try {
      const db = await openDB();
      ok('App-DB (' + DB_NAME + ') erreichbar');
    } catch(e) { err('App-DB Fehler: ' + e.message); }
    try {
      const db = await openImgDB();
      ok('Bild-DB (' + IMG_DB_NAME + ') erreichbar');
    } catch(e) { err('Bild-DB Fehler: ' + e.message); }
    sep();

    // ── State Summary ──
    log('📊 STATE ÜBERSICHT', '#f9d94e');
    inf('Athleten: ' + state.athletes.length);
    inf('Templates: ' + state.templates.length);
    inf('Trainings: ' + state.trainings.length);
    const imgIds = new Set();
    state.athletes.forEach(a => { if(a.photoId) imgIds.add(a.photoId); });
    state.templates.forEach(t => t.exercises?.forEach(e => (e.customImgIds||[]).forEach(id=>imgIds.add(id))));
    state.trainings.forEach(t => t.exercises?.forEach(e => (e.customImgIds||[]).forEach(id=>imgIds.add(id))));
    inf('Bild-IDs gesamt: ' + imgIds.size);
    try {
      const lsData = localStorage.getItem(LS_KEY);
      inf('localStorage Größe: ' + (lsData ? Math.round(lsData.length/1024) + ' KB' : 'leer'));
    } catch(e) { err('localStorage nicht lesbar: ' + e.message); }
    sep();

    log('✅ Debug abgeschlossen – Screenshot machen und schicken!', '#f9d94e');
  };
}

// ================================================================
// TRAINING CREATION + MODALS
// ================================================================
function createTraining(tplId) {
  const tpl=state.templates.find(t=>t.id===tplId);
  if(!tpl){alert('❌ Template nicht gefunden!');return null;}
  if(!tpl.exercises?.length){alert('❌ Template hat keine Übungen!');return null;}
  const tr={id:'tr_'+uid(),tplId,tplName:tpl.name,date:today(),exercises:JSON.parse(JSON.stringify(tpl.exercises)),records:{}};
  state.trainings.unshift(tr);state.trainId=tr.id;state.exId=tr.exercises[0]?.id||'';
  save();return tr;
}

let selectedTemplateId = '';
let selectedGroupId    = '';   // '' = alle Athleten

function openNewTrainingModal() {
  const options   = $('templateOptions');
  const grpOptions = $('groupOptions');
  const dateInput = $('newTrainingDate');
  dateInput.value = today();

  // ── Gruppen-Optionen ──
  selectedGroupId = state.activeGroupId || '';
  if (state.groups.length === 0) {
    grpOptions.innerHTML = `<div style="font-size:13px;color:#9ca3af;padding:4px 0 8px">Noch keine Gruppen angelegt — im Athleten-Tab erstellen.</div>`;
  } else {
    grpOptions.innerHTML = [
      // "Alle" Option
      `<div class="group-option ${selectedGroupId===''?'selected':''}" data-grp=""
        style="${selectedGroupId===''?'background:#1e293b;border-color:#1e293b':''}">
        <div>
          <div style="font-weight:800;font-size:14px">Alle Athleten</div>
          <div style="font-size:12px;opacity:.75">${state.athletes.length} Athleten</div>
        </div>
        <span style="font-size:20px">👥</span>
      </div>`,
      ...state.groups.map(g => {
        const col = groupColor(g.colorId);
        const cnt = g.athleteIds.filter(id => state.athletes.find(a=>a.id===id)).length;
        const sel = selectedGroupId === g.id;
        return `<div class="group-option ${sel?'selected':''}" data-grp="${g.id}"
          style="${sel?`background:${col.hex};border-color:${col.hex}`:''}">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:14px;height:14px;border-radius:50%;background:${col.hex};flex-shrink:0;${sel?'background:rgba(255,255,255,.5)':''}"></div>
            <div>
              <div style="font-weight:800;font-size:14px">${esc(g.name)}</div>
              <div style="font-size:12px;opacity:.7">${cnt} Athlet${cnt!==1?'en':''}</div>
            </div>
          </div>
          <span style="font-size:18px">▶</span>
        </div>`;
      })
    ].join('');

    $$('.group-option').forEach(opt => {
      opt.onclick = () => {
        selectedGroupId = opt.getAttribute('data-grp');
        // Visuelles Update ohne render()
        $$('.group-option').forEach(o => {
          const gid = o.getAttribute('data-grp');
          const col = gid ? groupColor(state.groups.find(g=>g.id===gid)?.colorId) : null;
          const active = gid === selectedGroupId;
          o.classList.toggle('selected', active);
          if (gid === '') {
            o.style.cssText = active ? 'background:#1e293b;border-color:#1e293b;color:#fff' : '';
          } else {
            o.style.cssText = active ? `background:${col.hex};border-color:${col.hex};color:#fff` : '';
          }
        });
      };
    });
  }

  // ── Template-Optionen ──
  options.innerHTML = state.templates.map(tpl => `
    <div class="tpl-option" data-tpl="${tpl.id}">
      <div><div class="tpl-name">${esc(tpl.name)}</div><div class="tpl-info">${tpl.exercises?.length||0} Übungen</div></div>
      <div style="font-size:24px">📋</div>
    </div>`).join('');

  selectedTemplateId = state.templates[0]?.id || '';
  $$('.tpl-option').forEach(opt => {
    opt.onclick = () => {
      $$('.tpl-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      selectedTemplateId = opt.getAttribute('data-tpl');
    };
  });
  options.querySelector('.tpl-option')?.classList.add('selected');

  $('newTrainingModal').classList.add('show');
}
function closeNewTrainingModal(){$('newTrainingModal').classList.remove('show');selectedTemplateId='';selectedGroupId='';}
function openEditDateModal(tid){
  const tr=state.trainings.find(t=>t.id===tid);if(!tr)return;
  $('editDateTrainingName').textContent=tr.tplName;$('editDateInput').value=tr.date||today();
  $('editDateModal').setAttribute('data-training-id',tid);$('editDateModal').classList.add('show');
}
function closeEditDateModal(){$('editDateModal').classList.remove('show');}

$('closeNewTraining').onclick=closeNewTrainingModal;
$('newTrainingModal').onclick=e=>{if(e.target.id==='newTrainingModal')closeNewTrainingModal();};
$('confirmNewTraining').onclick = () => {
  if (!selectedTemplateId) return alert('Bitte Template wählen');
  const date = $('newTrainingDate').value;
  if (!date) return alert('Bitte Datum wählen');
  const tpl = state.templates.find(t => t.id === selectedTemplateId);
  if (!tpl?.exercises?.length) return alert('❌ Template hat keine Übungen!');

  // Gruppe anwenden → activeIds setzen
  if (selectedGroupId) {
    const g = state.groups.find(x => x.id === selectedGroupId);
    if (g) {
      const validIds = g.athleteIds.filter(id => state.athletes.find(a => a.id === id));
      if (validIds.length) {
        state.activeGroupId = selectedGroupId;
        state.activeIds     = validIds;
        state.athId         = validIds[0];
      }
    }
  } else {
    // "Alle Athleten" gewählt → Gruppen-Filter aufheben
    state.activeGroupId = '';
    state.activeIds     = state.athletes.map(a => a.id);
    state.athId         = state.athletes[0]?.id || '';
  }

  const tr = {
    id: 'tr_'+uid(), tplId: selectedTemplateId, tplName: tpl.name,
    date, exercises: JSON.parse(JSON.stringify(tpl.exercises)), records: {},
    groupId: selectedGroupId || null,   // für spätere Referenz gespeichert
  };
  state.trainings.unshift(tr);
  state.trainId = tr.id;
  state.exId    = tr.exercises[0]?.id || '';
  save(); closeNewTrainingModal(); render();
};
$('closeEditDate').onclick=closeEditDateModal;
$('editDateModal').onclick=e=>{if(e.target.id==='editDateModal')closeEditDateModal();};
$('confirmEditDate').onclick=()=>{
  const tid=$('editDateModal').getAttribute('data-training-id');
  const newDate=$('editDateInput').value;if(!newDate)return alert('Bitte Datum wählen');
  const tr=state.trainings.find(t=>t.id===tid);
  if(tr){tr.date=newDate;save();closeEditDateModal();render();}
};
// Nav click handled in boot()

// ================================================================
// BOOT
// ================================================================
(async function boot() {
  const loaded  = await loadState();
  const defaults= buildDefaultState();
  state = Object.assign({}, defaults, loaded);

  // Ensure required fields
  state.athletes  = state.athletes  || defaults.athletes;
  state.activeIds = state.activeIds || defaults.activeIds;
  state.groups    = state.groups    || [];
  state.activeGroupId = state.activeGroupId || '';
  state.templates = state.templates || defaults.templates;
  state.trainings = state.trainings || [];
  state.tab       = state.tab       || 'tracking';
  state.athId     = state.athId     || state.athletes[0]?.id||'';
  state.trainId   = state.trainId   || '';
  state.exId      = state.exId      || '';
  state.deleted   = state.deleted   || [];
  state.weekGoal  = state.weekGoal  || 4;

  // ── Migration: add new fields to existing data ──
  state.athletes.forEach(a=>{ if(!a.photoId) a.photoId=''; });
  state.templates.forEach(tpl=>{ tpl.exercises?.forEach(ex=>{ if(!ex.customImgIds) ex.customImgIds=[]; }); });
  state.trainings.forEach(tr=>{  tr.exercises?.forEach(ex=>{  if(!ex.customImgIds) ex.customImgIds=[]; }); if(!tr.note) tr.note=''; });

  if(state.athId && !state.athletes.find(a=>a.id===state.athId))
    state.athId=state.activeIds[0]||state.athletes[0]?.id||'';

  save();

  // Pre-load all athlete thumbnails into memory cache
  await preloadAthThumbs();

  // Bind nav tab clicks
  $$('.nav-item').forEach(el => {
    el.addEventListener('click', () => {
      const tab = el.getAttribute('data-tab');
      state.tab = tab; save(); render();
    });
  });

  // Bind player card clicks (delegated – cards are rendered async)
  document.addEventListener('click', e => {
    const card = e.target.closest('[data-pc-ath]');
    if (card) {
      const athId = card.getAttribute('data-pc-ath');
      if (state.athId !== athId) { state.athId = athId; save(); render(); }
    }
  });

  // Init calendar to today
  _calDate = new Date(); _calSelectedDate = today();

  // Athleten-Modal binden
  bindAddAthModal();

  render();
  console.log(`✅ Kickr PRO v${APP_VERSION} – Athleten-Bar zweizeilig, aktive Karte, AddAth-Modal, kein Badge-Klick`);
})();
</script>
