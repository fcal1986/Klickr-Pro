function openAthPopup(athId) {
  const ath = state.athletes.find(a => a.id === athId);
  const tr  = state.trainings.find(t => t.id === state.trainId);
  if (!ath || !tr) return;

  const popup   = $('athPopup');
  const title   = $('athPopupTitle');
  const sub     = $('athPopupSub');
  const body    = $('athPopupBody');
  const backdrop = $('athPopupBackdrop');

  title.textContent = ath.name;
  sub.textContent   = `${esc(tr.tplName)} · ${fmtDate(tr.date)}`;

  // Alle Einträge dieses Athleten in diesem Training
  const exercises = tr.exercises || [];
  const hasAny = exercises.some(ex => (tr.records?.[`${ath.id}_${ex.id}`]||[]).length > 0);

  if (!hasAny) {
    body.innerHTML = `<div class="ath-popup-empty">Noch keine Einträge für dieses Training.</div>`;
  } else {
    body.innerHTML = exercises.map(ex => {
      const recs = tr.records?.[`${ath.id}_${ex.id}`] || [];
      if (!recs.length) return '';
      const rows = recs.map(r => {
        let val = '';
        if (ex.type === 'lr')   val = `L: ${r.left ?? '–'}  R: ${r.right ?? '–'}`;
        else if (ex.type === 'time') val = `${r.value}s`;
        else                    val = r.value;
        const time = r.ts ? new Date(r.ts).toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'}) : '';
        return `<div class="ath-popup-rec">
          <span style="font-weight:700">${val}</span>
          <span style="color:#94a3b8;font-size:12px">${time}${r.note ? '  · ' + esc(r.note) : ''}</span>
        </div>`;
      }).join('');
      return `<div class="ath-popup-ex">
        <div class="ath-popup-ex-title">${esc(ex.title)}</div>
        ${rows}
      </div>`;
    }).join('');
  }

  popup.style.display = 'flex';
  document.body.style.overflow = 'hidden';

  // Schließen
  const close = () => {
    popup.style.display = 'none';
    document.body.style.overflow = '';
    backdrop.removeEventListener('click', close);
  };
  backdrop.addEventListener('click', close);
}

// ================================================================
// RENDER – Navigation + Athletes bar
// ================================================================
function render() {
  $$('.nav-item').forEach(el =>
    el.classList.toggle('active', el.getAttribute('data-tab')===state.tab));

  const athDiv = $('athletes');
  if (state.tab==='tracking' || state.tab==='statistics' || state.tab==='duel') {
    athDiv.style.display = 'block';

    // Gruppe vom aktuellen Training lesen
    const curTr = state.trainings.find(t => t.id === state.trainId);
    const curGroup = curTr?.groupId ? state.groups.find(g => g.id === curTr.groupId) : null;
    const curCol = curGroup ? groupColor(curGroup.colorId) : null;

    // Gruppen-Label-Zeile (nur wenn Gruppen vorhanden)
    const showGroupRow = state.groups.length > 0;
    const groupRowHtml = showGroupRow ? `
      <div class="athletes-group-row">
        ${curGroup
          ? `<div class="athletes-group-dot" style="background:${curCol.hex}"></div>
             <span class="athletes-group-label" style="color:${curCol.hex}">${esc(curGroup.name)}</span>
             <span style="font-size:10px;color:#94a3b8;margin-left:auto;flex-shrink:0">${state.activeIds.length} Athleten</span>`
          : `<span class="athletes-group-label" style="color:#94a3b8">Alle Athleten</span>
             <span style="font-size:10px;color:#94a3b8;margin-left:auto;flex-shrink:0">${state.activeIds.length} Athleten</span>`
        }
      </div>` : '';

    // padding-top für main dynamisch setzen:
    // Header 54px + (Gruppen-Zeile ~26px wenn vorhanden) + Avatar-Zeile ~72px + 4px Luft
    document.documentElement.style.setProperty('--main-top', showGroupRow ? '154px' : '128px');

    // Avatar-Zeile — alphabetisch sortiert
    const sortedActiveIds = [...state.activeIds].sort((a, b) => {
      const na = state.athletes.find(x=>x.id===a)?.name || '';
      const nb = state.athletes.find(x=>x.id===b)?.name || '';
      return na.localeCompare(nb);
    });

    const avatarsHtml = sortedActiveIds.map(aid => {
      const a = state.athletes.find(x=>x.id===aid); if(!a) return '';
      const src = _imgCache.get(a.photoId) || a.photo || DEFAULT_AVATAR;
      return `<div class="ath ${a.id===state.athId?'active':''}" data-ath="${a.id}" draggable="true" data-ath-drag="${a.id}" style="cursor:grab">
        <img src="${src}" data-lazy-ath="${a.id}"/>
        <div class="ath-name">${esc(a.name)}</div>
      </div>`;
    }).join('') +
    `<div class="ath-add-slot" id="athAddSlot" title="Athlet hinzufügen">
      <div class="ath-add-slot-circle">+</div>
      <div class="ath-add-slot-label">Neu</div>
    </div>`;

    athDiv.innerHTML = groupRowHtml + `<div class="athletes-avatar-row">${avatarsHtml}</div>`;

    // Lazy-load
    $$('[data-lazy-ath]').forEach(async img => {
      const a = state.athletes.find(x=>x.id===img.getAttribute('data-lazy-ath'));
      if (a?.photoId && !_imgCache.has(a.photoId)) {
        const src = await cachedThumb(a.photoId); if(src) img.src = src;
      }
    });

    // Tap → Athlet auswählen | Long-Press → Einträge-Popup
    $$('[data-ath]').forEach(el => {
      let pressTimer = null;
      const aid = el.getAttribute('data-ath');
      el.addEventListener('pointerdown', () => {
        pressTimer = setTimeout(() => { pressTimer = null; openAthPopup(aid); }, 500);
      });
      el.addEventListener('pointerup',    () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
      el.addEventListener('pointerleave', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
      el.onclick = () => {
        if (aid !== state.athId) { _timer.reset(); _timer.exKey = ''; }
        state.athId = aid; save(); render();
      };
    });

    // + Slot: Modal öffnen (neuer Athlet ODER bestehender aus Nicht-Gruppe)
    const addSlot = $('athAddSlot');
    if (addSlot) addSlot.onclick = () => openAddAthModal();

    // Drag-to-reorder
    let _athDragSrc = null;
    $$('[data-ath-drag]').forEach(el => {
      el.addEventListener('dragstart', e => { _athDragSrc = el; e.dataTransfer.effectAllowed='move'; });
      el.addEventListener('dragover',  e => { e.preventDefault(); });
      el.addEventListener('drop', e => {
        e.preventDefault();
        if (!_athDragSrc || _athDragSrc===el) return;
        const fromId = _athDragSrc.getAttribute('data-ath-drag');
        const toId   = el.getAttribute('data-ath-drag');
        const fi = state.activeIds.indexOf(fromId), ti = state.activeIds.indexOf(toId);
        if (fi>=0 && ti>=0) { state.activeIds.splice(fi,1); state.activeIds.splice(ti,0,fromId); save(); render(); }
      });
    });
  } else {
    athDiv.style.display = 'none';
    document.documentElement.style.setProperty('--main-top', '74px');
  }

  const main=$('main'), title=$('title'), sub=$('subtitle');
  if      (state.tab==='tracking')   { title.textContent='🏋️ Training';  sub.textContent='Erfasse Leistungen'; renderTracking(main); }
  else if (state.tab==='statistics') { title.textContent='📊 Statistiken'; sub.textContent='Fortschritt';       renderStats(main); }
  else if (state.tab==='duel')       { title.textContent='⚔️ Duell';       sub.textContent='Athleten-Vergleich';renderDuel(main); }
  else if (state.tab==='templates')  { title.textContent='📋 Templates';   sub.textContent=`${state.templates.length} Templates`; renderTemplates(main); }
  else if (state.tab==='athletes')   { title.textContent='👥 Athleten';    sub.textContent=`${state.athletes.length} Athleten`;   renderAthletes(main); }
  else if (state.tab==='system')     { title.textContent='⚙️ System';      sub.textContent='Einstellungen';     renderSystem(main); }
}

function bindStreakGoalBtns() {
  if ($('goalMinus')) $('goalMinus').onclick = () => { state.weekGoal = Math.max(1, (state.weekGoal||4)-1); save(); render(); };
  if ($('goalPlus'))  $('goalPlus').onclick  = () => { state.weekGoal = Math.min(7, (state.weekGoal||4)+1); save(); render(); };
}

// ================================================================
// RENDER TRACKING
// ================================================================
function renderTracking(host) {
  const tr  = state.trainings.find(t=>t.id===state.trainId);
  const ex  = tr?.exercises?.find(e=>e.id===state.exId);
  const ath = state.athletes.find(a=>a.id===state.athId);

  if (!tr || !ath || !tr.exercises?.length) {
    host.innerHTML = renderStreakBanner() + `<div class="card"><h2>Kein Training</h2><p>Erstelle ein Training um zu starten!</p>
      <button id="newTr">➕ Training erstellen</button></div>`;
    $('newTr').onclick = () => {
      if (!state.templates.length) { alert('Erstelle zuerst ein Template!'); state.tab='templates'; save(); render(); return; }
      createTraining(state.templates[0].id); render();
    };
    bindStreakGoalBtns();
    return;
  }

  // Training selector row
  const todayStr = today();
  let html = renderStreakBanner();
  html += `<div class="card"><div class="sec-head"><span>🏋️ Training</span>
    <button class="small" id="newTr">➕ Neu</button></div><div class="scroll-row">`;
  state.trainings.forEach(t => {
    if (!t.exercises?.length) return;
    const active = t.id===tr.id?'active':'';
    const photo  = PHOTOS.find(p=>p.id===(t.exercises[0]?.exPhotoId||'e1'))||PHOTOS[0];

    // Ampel: hat der aktive Athlet mindestens einen Eintrag in diesem Training?
    const athHasEntry = ath && t.exercises.some(ex => {
      const recs = t.records?.[`${ath.id}_${ex.id}`] || [];
      return recs.length > 0;
    });
    const ampel = `<div style="position:absolute;top:8px;left:8px;width:14px;height:14px;border-radius:50%;background:${athHasEntry?'#10b981':'#ef4444'};box-shadow:0 0 0 2px #fff,0 0 8px ${athHasEntry?'rgba(16,185,129,.6)':'rgba(239,68,68,.6)'}"></div>`;

    // Fortschritt: wie viele Übungen hat der aktive Athlet ausgefüllt?
    const totalEx = t.exercises.length;
    const doneEx  = ath ? t.exercises.filter(ex => {
      const recs = t.records?.[`${ath.id}_${ex.id}`] || [];
      return recs.length > 0;
    }).length : 0;
    const pct = totalEx > 0 ? Math.round((doneEx / totalEx) * 100) : 0;
    const barClass = pct === 0 ? 'empty' : pct < 100 ? 'partial' : '';
    const progressBar = `
      <div class="tr-progress-bar">
        <div class="tr-progress-fill ${barClass}" style="width:${pct}%"></div>
      </div>`;

    // Gruppen-Rahmenfarbe
    const trGroup = t.groupId ? state.groups.find(g => g.id === t.groupId) : null;
    const groupBorderColor = (trGroup && t.id !== tr.id) ? groupColor(trGroup.colorId).hex : null;
    const cardStyle = groupBorderColor ? `border-color:${groupBorderColor};` : '';

    const groupBadgeHtml = (() => {
      if (trGroup) {
        const col = groupColor(trGroup.colorId);
        return `<div style="display:inline-flex;align-items:center;gap:4px;margin-top:4px;padding:2px 7px;border-radius:999px;background:${col.hex}18;border:1px solid ${col.hex}50">
          <span style="width:6px;height:6px;border-radius:50%;background:${col.hex};flex-shrink:0"></span>
          <span style="font-size:10px;font-weight:800;color:${col.hex}">${esc(trGroup.name)}</span>
        </div>`;
      } else if (state.groups.length > 0) {
        return `<div style="display:inline-flex;align-items:center;gap:4px;margin-top:4px;padding:2px 7px;border-radius:999px;background:#f1f5f9">
          <span style="font-size:10px;font-weight:700;color:#94a3b8">Alle Athleten</span>
        </div>`;
      }
      return '';
    })();

    html += `<div class="tr-card ${active}" data-tr="${t.id}" style="${cardStyle}">
      <button class="del-btn" data-del="${t.id}" style="top:8px;right:46px">🗑</button>
      <button class="del-btn" data-edit-date="${t.id}" style="top:8px;right:8px;background:#3b82f6">📅</button>
      ${ampel}
      <img src="${photo.url}"/>
      <div class="tr-info">
        <div class="tr-title">${esc(t.tplName)}</div>
        <div class="tr-date">${fmtDate(t.date)}</div>
        ${groupBadgeHtml}
      </div>
      ${progressBar}
      ${t.note?`<div class="tr-note-badge">📝 ${esc(t.note)}</div>`:''}
    </div>`;
  });
  html += `</div></div>`;

  // Athlete reorder (drag-and-drop in athletes bar) hint
  html += `<div class="card" style="padding:12px 16px;display:flex;align-items:center;gap:10px">
    <span style="font-size:14px">👥</span>
    <span style="font-size:13px;font-weight:700;flex:1">Athleten-Reihenfolge</span>
    <span style="font-size:11px;color:#6b7280">Gedrückt halten + ziehen</span>
  </div>`;

  // Exercise chips
  html += `<div class="card"><div class="sec-head"><span>💪 Übung</span></div><div>`;
  (tr.exercises||[]).forEach(e => {
    const active = e.id===ex?.id?'active':'';
    const photo  = PHOTOS.find(p=>p.id===(e.exPhotoId||'e1'))||PHOTOS[0];
    html += `<div class="ex-chip ${active}" data-ex="${e.id}">${photo.label.split(' ')[0]} ${esc(e.title)}</div>`;
  });
  html += `</div></div>`;

  // Active exercise panel
  if (ex) {
    const photo = PHOTOS.find(p=>p.id===(ex.exPhotoId||'e1'))||PHOTOS[0];
    html += `<div class="card">`;

    // ── FEATURE B: show custom images or fallback ──
    if (ex.customImgIds?.length) {
      html += `<div class="ex-photo-row" id="exPhotoRow">`;
      ex.customImgIds.forEach((id, idx) => {
        const cached = _imgCache.get(id) || '';
        html += `<img class="ex-photo-thumb" src="${cached}" data-lazy-ex="${id}" data-lb-idx="${idx}" loading="lazy" alt="Übungsbild"/>`;
      });
      html += `</div>`;
    } else {
      html += `<img src="${photo.url}" style="width:100%;height:120px;object-fit:cover;border-radius:12px;margin-bottom:16px"/>`;
    }

    html += `<h3>${esc(ex.title)}</h3><p style="color:#6b7280;margin:8px 0">${ex.hint||''} • Pause ${ex.restSec}s</p>`;

    if (ex.type==='reps') {
      html += `<label>Anzahl Wiederholungen</label><input type="number" id="inp" class="big-input" placeholder="0"/>`;
    } else if (ex.type==='lr') {
      html += `<div class="row">
        <div style="flex:1"><label>👈 Links</label><input type="number" id="inpL" class="big-input" placeholder="0"/></div>
        <div style="flex:1"><label>👉 Rechts</label><input type="number" id="inpR" class="big-input" placeholder="0"/></div>
      </div>`;
    } else if (ex.type==='time') {
      const tDir = getTimeDir(ex);
      const dirHint = tDir === 'asc'
        ? '<span style="font-size:11px;color:#94a3b8">🏃 kürzer = besser</span>'
        : '<span style="font-size:11px;color:#94a3b8">🏅 länger = besser</span>';
      const savedStr = _timer.savedMs !== null
        ? `<div style="font-size:12px;color:#3b82f6;font-weight:700;text-align:center;margin-top:-8px;margin-bottom:8px">✓ Gespeichert: ${(_timer.savedMs/1000).toFixed(2)}s</div>`
        : '';
      html += `
        <div style="text-align:center;margin-bottom:4px">${dirHint}</div>
        <div class="timer-big ${_timer.running?'running':(_timer.savedMs!==null?'saved':'')}" id="timerDisplay">${_timer.fmt()}</div>
        ${savedStr}
        <div class="row" style="gap:10px;margin-bottom:0">
          <button id="timerToggle" class="timer-toggle-btn ${_timer.running?'btn-stop':'btn-start'}" style="flex:2">
            ${_timer.running ? '⏸  Stop' : (_timer.ms > 0 ? '▶  Weiter' : '▶  Start')}
          </button>
          <button id="timerReset" style="flex:1;background:#f1f5f9;color:#475569;font-size:14px" ${_timer.running?'disabled':''}>↺ Reset</button>
        </div>`;
    }

    html += `<label>📝 Notiz (optional)</label>
      <input type="text" id="note" placeholder="Notiz zur Übung..."/>
      <button id="saveRec">💾 Speichern</button>`;
    if (ex.restSec>0) html += `<button id="startRest">⏱ Pause ${ex.restSec}s</button>`;
    html += `</div>`;

    // ── FEATURE 13: Trainings-Notiz ──
    html += `<div class="card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:16px">📋</span><strong>Trainings-Notiz</strong></div>
      <input type="text" id="trNote" value="${esc(tr.note||'')}" placeholder="z.B. Heute müde, neues Schuhwerk, nach Verletzungspause..."/>
      <button id="saveTrNote" class="small" style="margin-top:8px;width:auto">💾 Notiz speichern</button>
    </div>`;

    // Records
    const key  = `${ath.id}_${ex.id}`;
    const recs = (tr.records[key]||[]).slice().reverse();
    if (recs.length) {
      const last = recs[0];
      const lastVal = ex.type==='reps'?last.value:ex.type==='lr'?`L:${last.left} R:${last.right}`:last.value+'s';
      html += `<div class="card"><h3>📊 Einträge (${recs.length})</h3>
        <div style="font-size:11px;color:#6b7280;margin-bottom:8px">👆 Nach rechts swipen = letzten Wert wiederholen</div>`;
      recs.forEach((r,i) => {
        const val = ex.type==='reps'?r.value:ex.type==='lr'?`L:${r.left} R:${r.right}`:r.value+'s';
        html += `<div class="ex-entry-card">
          <div class="swipe-hint">↩ ${lastVal} wiederholen</div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><div style="font-weight:900;font-size:20px;color:#3b82f6">${val}</div>
            <div style="font-size:12px;color:#6b7280;margin-top:4px">${fmtTime(r.ts)}${r.note?' • '+esc(r.note):''}</div></div>
            <button class="danger small" data-delRec="${i}">🗑</button>
          </div>
        </div>`;
      });
      html += `</div>`;
    }
  }

  host.innerHTML = html;

  // ── Streak goal buttons ──
  bindStreakGoalBtns();

  // ── FEATURE 13: Save training note ──
  if ($('saveTrNote')) {
    $('saveTrNote').onclick = () => {
      tr.note = $('trNote')?.value || '';
      save();
      showToast('📋 Trainings-Notiz gespeichert');
    };
  }

  // ── FEATURE 18: Swipe-to-repeat ──
  if (ex) bindSwipeToRepeat(tr, ath, ex);

  // Lazy-load exercise image thumbnails + bind lightbox
  if (ex?.customImgIds?.length) {
    $$('[data-lazy-ex]').forEach(async img => {
      const id  = img.getAttribute('data-lazy-ex');
      const src = _imgCache.get(id) || await cachedThumb(id);
      if (src) { img.src = src; _imgCache.set(id, src); }
      img.onclick = () => openLightbox(ex.customImgIds, +img.getAttribute('data-lb-idx'));
    });
  }

  // ── Event handlers (all original logic preserved) ──
  $('newTr').onclick = () => {
    if (!state.templates.length) { alert('❌ Keine Templates!'); state.tab='templates'; save(); render(); return; }
    openNewTrainingModal();
  };
  $$('[data-tr]').forEach(el => {
    el.onclick = e => {
      if (e.target.closest('.del-btn')) return;
      const scrollRow = el.closest('.scroll-row');
      const savedScrollLeft = scrollRow ? scrollRow.scrollLeft : 0;

      state.trainId = el.getAttribute('data-tr');
      const t = state.trainings.find(x=>x.id===state.trainId);
      if (!t) return;
      state.exId = t.exercises[0]?.id || '';

      // Athleten-Bar aus Training-Gruppe aktualisieren
      if (t.groupId) {
        const g = state.groups.find(x => x.id === t.groupId);
        if (g) {
          const validIds = g.athleteIds.filter(id => state.athletes.find(a => a.id === id));
          if (validIds.length) {
            state.activeGroupId = g.id;
            state.activeIds     = validIds;
            state.athId         = validIds.includes(state.athId) ? state.athId : validIds[0];
          }
        }
      } else {
        // Kein Gruppen-Filter → alle Athleten
        state.activeGroupId = '';
        state.activeIds     = state.athletes.map(a => a.id);
        if (!state.activeIds.includes(state.athId)) state.athId = state.activeIds[0] || '';
      }

      save(); render();

      requestAnimationFrame(() => {
        const newScrollRow = document.querySelector('.scroll-row');
        if (newScrollRow) newScrollRow.scrollLeft = savedScrollLeft;
      });
    };
  });
  $$('[data-edit-date]').forEach(btn => {
    btn.onclick = e => { e.stopPropagation(); openEditDateModal(btn.getAttribute('data-edit-date')); };
  });
  $$('[data-del]').forEach(btn => {
    btn.onclick = e => {
      e.stopPropagation();
      const id=btn.getAttribute('data-del');
      const t=state.trainings.find(x=>x.id===id);
      if (!t||!confirm(`Training "${t.tplName}" löschen?`)) return;
      state.deleted.unshift({tr:JSON.parse(JSON.stringify(t)),ts:new Date().toISOString()});
      if (state.deleted.length>5) state.deleted.pop();
      state.trainings=state.trainings.filter(x=>x.id!==id);
      if (!state.trainings.length){state.trainId='';state.exId='';}
      else if(state.trainId===id){state.trainId=state.trainings[0].id;state.exId=state.trainings[0].exercises?.[0]?.id||'';}
      save(); render(); showUndo();
    };
  });
  $$('[data-ex]').forEach(el => {
    el.onclick = () => {
      const newExId = el.getAttribute('data-ex');
      // Wenn zu einer anderen Übung gewechselt wird → Timer zurücksetzen
      if (newExId !== state.exId) {
        _timer.reset();
        _timer.exKey = '';
      }
      state.exId = newExId;
      save(); render();
    };
  });

  if ($('saveRec') && ex) {
    $('saveRec').onclick = () => {
      const key  = `${ath.id}_${ex.id}`;
      if (!tr.records[key]) tr.records[key] = [];
      const note = $('note')?.value || '';
      const ts   = new Date().toISOString();

      if (ex.type === 'reps') {
        const v = $('inp')?.value;
        if (!v || v === '0') return alert('Bitte Anzahl eingeben');
        tr.records[key].push({ ts, value: v, note });
        save(); render();
      } else if (ex.type === 'lr') {
        const L = $('inpL')?.value, R = $('inpR')?.value;
        if (!L || !R) return alert('Bitte L und R eingeben');
        tr.records[key].push({ ts, left: L, right: R, note });
        save(); render();
      } else if (ex.type === 'time') {
        // Timer stoppen beim Speichern
        const ms = _timer.ms;
        if (!ms || ms === 0) return alert('Bitte Timer starten');
        _timer.stop();
        _timer.savedMs = ms;
        const v = (ms / 1000).toFixed(2);
        tr.records[key].push({ ts, value: v, note });
        save();
        // Kein volles render() — nur Timer-Display und Einträge-Liste aktualisieren
        _timer._update();
        // Einträge-Bereich neu rendern ohne Timer zu resetten
        render();
      }
    };
  }

  // ── Timer: Ein-Button-Logik ──
  if ($('timerToggle')) {
    // Sicherstellen dass der Timer für diese Übung läuft
    const curKey = `${ath.id}_${ex.id}`;
    // Wenn wir die Übung gewechselt haben → Timer resetten
    if (_timer.exKey && _timer.exKey !== curKey && !_timer.running) {
      _timer.reset();
    }
    _timer.exKey = curKey;

    $('timerToggle').onclick = () => {
      if (_timer.running) {
        _timer.stop();
      } else {
        _timer.start();
      }
    };

    $('timerReset').onclick = () => {
      if (_timer.running) return; // disabled während laufend
      _timer.reset();
    };

    // Initial-State synchronisieren
    _timer._update();
  }
  if ($('startRest')&&ex) {
    $('startRest').onclick=()=>{
      let left=ex.restSec;
      const div=document.createElement('div');
      div.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:20px 30px;border-radius:16px;z-index:999;font-size:32px;font-weight:900';
      div.textContent=`${Math.floor(left/60)}:${String(left%60).padStart(2,'0')}`;
      document.body.appendChild(div);
      const it=setInterval(()=>{if(left>0){left--;div.textContent=`${Math.floor(left/60)}:${String(left%60).padStart(2,'0')}`;}else{clearInterval(it);div.remove();alert('✅ Pause vorbei!');}},1000);
    };
  }
  $$('[data-delRec]').forEach(btn=>{
    btn.onclick=()=>{
      if(!confirm('Eintrag löschen?'))return;
      const key=`${ath.id}_${ex.id}`;const idx=+btn.getAttribute('data-delRec');
      const recs=tr.records[key]||[];recs.splice(recs.length-1-idx,1);save();render();
    };
  });
}

function showUndo() {
  const div=document.createElement('div');
  div.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:12px 20px;border-radius:12px;z-index:999;display:flex;gap:12px;align-items:center';
  div.innerHTML=`<span>Training gelöscht</span><button id="undo" style="background:#3b82f6;color:#fff;border:none;padding:8px 12px;border-radius:8px;font-weight:700;cursor:pointer">UNDO</button>`;
  document.body.appendChild(div);
  $('undo').onclick=()=>{const d=state.deleted.shift();if(d){state.trainings.unshift(d.tr);state.trainId=d.tr.id;save();render();}div.remove();};
  setTimeout(()=>div.remove(),8000);
}

// ================================================================
// RENDER STATS (original logic, adds cached bench avatars)
// ================================================================
let _statsTab      = 'training'; // 'training' | 'group'
let _statsPeriod   = 7;
let _grpStatTrId   = '';         // ausgewähltes Training in Gruppenstatistik ('' = alle)

async function renderStats(host) {
  host.innerHTML = '';

  // ── Tab Toggle ──
  const headerDiv = document.createElement('div');
  headerDiv.style.cssText = 'padding:16px 0 0';
  headerDiv.innerHTML = `
    <div class="stats-tab-toggle">
      <button class="stats-tab-btn ${_statsTab==='training'?'active':''}" id="stTabTrain">Mein Training</button>
      <button class="stats-tab-btn ${_statsTab==='group'?'active':''}" id="stTabTeam">Gruppenstatistik</button>
    </div>
    <div class="stats-period-bar">
      ${[7,30,60].map(d=>`<button class="stats-period-btn ${_statsPeriod===d?'active':''}" data-period="${d}">${d} Tage</button>`).join('')}
    </div>`;
  host.appendChild(headerDiv);

  headerDiv.querySelector('#stTabTrain').onclick = () => { _statsTab='training'; renderStats(host); };
  headerDiv.querySelector('#stTabTeam').onclick  = () => { _statsTab='group';   renderStats(host); };
  headerDiv.querySelectorAll('[data-period]').forEach(btn => {
    btn.onclick = () => { _statsPeriod = +btn.dataset.period; renderStats(host); };
  });

  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - _statsPeriod);
  cutoff.setHours(0,0,0,0);

  // ════════════════════════════════════════════
  if (_statsTab === 'group') {
    await renderGroupStats(host, cutoff);
    return;
  }

  // ════════════════════════════════════════════
  // Mein Training (Einzel-Athlet)
  const ath = state.athletes.find(a=>a.id===state.athId);
  if (!ath) return;

  const data = { total:0, trainings:0, exercises:{} };
  state.trainings.forEach(tr => {
    if (!tr.exercises || !Array.isArray(tr.exercises)) return;
    if (tr.date && new Date(tr.date+'T12:00') < cutoff) return;
    let hasData = false;
    tr.exercises.forEach(ex => {
      if (!ex?.id) return;
      const key = `${ath.id}_${ex.id}`;
      const recs = tr.records?.[key] || [];
      if (recs.length) {
        hasData = true; data.total += recs.length;
        if (!data.exercises[ex.title]) data.exercises[ex.title] = {type:ex.type,records:[],chartId:uid()};
        recs.forEach(r => {
          let v=0;
          if(ex.type==='reps') v=parseFloat(r.value)||0;
          else if(ex.type==='lr') v=(parseFloat(r.left)||0)+(parseFloat(r.right)||0);
          else v=parseFloat(r.value)||0;
          if(v>0) data.exercises[ex.title].records.push({date:new Date(r.ts),value:v,trName:tr.tplName,trDate:tr.date});
        });
      }
    });
    if (hasData) data.trainings++;
  });

  if (!data.total) {
    const emptyDiv = document.createElement('div');
    emptyDiv.innerHTML = `<div class="stats-empty">
      <div class="stats-empty-icon">📊</div>
      <div class="stats-empty-title">Im ausgewählten Zeitraum wurde kein Training absolviert</div>
      <div class="stats-empty-sub">Absolviere Trainings in diesem Zeitraum um Statistiken zu sehen</div>
      <button class="stats-cta-btn" id="statsGoTrain">ZUM TRAININGSPLAN</button>
    </div>`;
    host.appendChild(emptyDiv);
    emptyDiv.querySelector('#statsGoTrain').onclick = () => { state.tab='tracking'; save(); render(); };
    return;
  }

  const statsDiv = document.createElement('div');
  let html = `<div class="card"><h2>📊 ${esc(ath.name)} – ${_statsPeriod} Tage</h2><div class="stat-grid">
    <div class="stat-box"><div class="stat-val">${data.total}</div><div class="stat-lbl">Einträge</div></div>
    <div class="stat-box"><div class="stat-val">${data.trainings}</div><div class="stat-lbl">Trainings</div></div>
    <div class="stat-box"><div class="stat-val">${Object.keys(data.exercises).length}</div><div class="stat-lbl">Übungen</div></div>
  </div></div>`;

  Object.entries(data.exercises).forEach(([exTitle,stats])=>{
    stats.records.sort((a,b)=>a.date-b.date);
    const vals=stats.records.map(r=>r.value);
    const timeDir = stats.type==='time' ? getTimeDirByTitle(exTitle) : 'desc';
    const bestV   = bestVal(vals, timeDir);
    const best    = bestV?.toFixed(1) ?? '-';
    const avg     = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '-';
    const bestRec = stats.records.find(r=>r.value===bestV);
    let imp='-';
    if(vals.length>=2){
      // Trend: positiv = Verbesserung (bei asc: Wert sinkt = gut, bei desc: Wert steigt = gut)
      const delta = vals[vals.length-1] - vals[0];
      const pct   = Math.abs(delta/vals[0]*100).toFixed(0);
      const improved = timeDir==='asc' ? delta < 0 : delta > 0;
      imp = improved ? `+${pct}%` : `-${pct}%`;
    }
    const bench=[];
    state.athletes.forEach(a=>{
      const av=[];
      state.trainings.forEach(tr=>{tr.exercises?.forEach(ex=>{if(ex?.title!==exTitle)return;const k=`${a.id}_${ex.id}`;(tr.records?.[k]||[]).forEach(r=>{let v=0;if(stats.type==='reps')v=parseFloat(r.value)||0;else if(stats.type==='lr')v=(parseFloat(r.left)||0)+(parseFloat(r.right)||0);else v=parseFloat(r.value)||0;if(v>0)av.push(v);});});});
      if(av.length){
        const bv=bestVal(av,timeDir);
        bench.push({id:a.id,name:a.name,photoId:a.photoId,photo:a.photo,best:bv?.toFixed(1)??'-',bestNum:bv??0,avg:(av.reduce((a,b)=>a+b,0)/av.length).toFixed(1)});
      }
    });
    // Sortierung: bei asc (Sprint) kleinster Wert zuerst
    bench.sort((a,b) => timeDir==='asc' ? a.bestNum - b.bestNum : b.bestNum - a.bestNum);

    const dirLabel = stats.type==='time' ? (timeDir==='asc' ? ' 🏃 kürzer=besser' : ' 🏅 länger=besser') : '';
    html+=`<div class="card"><h3>💪 ${esc(exTitle)}<span style="font-size:11px;color:#94a3b8;font-weight:600">${dirLabel}</span></h3><p style="color:#6b7280;margin:8px 0">${stats.records.length} Einträge</p>
      <canvas id="chart_${stats.chartId}" style="max-height:250px;margin:16px 0"></canvas>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-val">${best}</div><div class="stat-lbl">Best</div></div>
        <div class="stat-box"><div class="stat-val">${avg}</div><div class="stat-lbl">Ø</div></div>
        <div class="stat-box"><div class="stat-val">${imp}</div><div class="stat-lbl">Trend</div></div>
      </div>
      ${bestRec?`<div class="best-day"><div class="best-icon">🏆</div><div class="best-info"><div class="best-title">Beste Leistung</div><div class="best-sub">${fmtDate(bestRec.trDate)}</div></div><div class="best-val">${best}</div></div>`:''}
      ${bench.length>1?`<div class="bench"><h4 style="margin:0 0 12px">📊 Vergleich</h4>${bench.map((b,i)=>`<div class="bench-item ${b.id===ath.id?'me':''}"><div class="bench-rank">${i+1}.</div><img class="bench-ava" src="${_imgCache.get(b.photoId)||b.photo||DEFAULT_AVATAR}" data-lazy-bench="${b.photoId||''}"/><div class="bench-name">${esc(b.name)}</div><div class="bench-val">${b.best}</div></div>`).join('')}</div>`:''}
    </div>`;
  });
  statsDiv.innerHTML = html;
  host.appendChild(statsDiv);

  $$('[data-lazy-bench]').forEach(async img=>{
    const id=img.getAttribute('data-lazy-bench');
    if(id&&!_imgCache.has(id)){const src=await cachedThumb(id);if(src)img.src=src;}
  });
  setTimeout(()=>{
    Object.entries(data.exercises).forEach(([exTitle,stats])=>{
      const canvas=$(`chart_${stats.chartId}`);if(!canvas)return;
      new Chart(canvas,{type:'line',data:{labels:stats.records.map(r=>fmtDate(r.trDate)),datasets:[{label:exTitle,data:stats.records.map(r=>r.value),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',tension:.4,fill:true,pointRadius:6,pointBackgroundColor:'#3b82f6',pointBorderColor:'#fff',pointBorderWidth:2}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#e5e7eb'}},x:{grid:{display:false}}}}});
    });
  },100);
}

// ================================================================
// GRUPPENSTATISTIK
// ================================================================
async function renderGroupStats(host, cutoff) {
  await _preloadRankedThumbs();

  // Trainings im Zeitraum — nur die mit Gruppen-Bezug
  const recentTrs = state.trainings
    .filter(t => !cutoff || !t.date || new Date(t.date+'T12:00') >= cutoff)
    .sort((a,b) => (b.date||'').localeCompare(a.date||''));

  const grpTrs = recentTrs.filter(t => t.groupId && state.groups.find(g=>g.id===t.groupId));
  const noGrpTrs = recentTrs.filter(t => !t.groupId);
  const allShown = [...grpTrs, ...noGrpTrs]; // Gruppen-Trainings zuerst

  // Aktuell ausgewähltes Training validieren
  if (_grpStatTrId && !allShown.find(t=>t.id===_grpStatTrId)) _grpStatTrId = '';

  const selTr = _grpStatTrId ? allShown.find(t=>t.id===_grpStatTrId) : null;

  // Athleten-Pool: wenn Training gewählt → Gruppe des Trainings; sonst alle
  let poolAthletes = state.athletes;
  let poolLabel    = 'Alle Athleten';
  let poolColor    = null;
  if (selTr?.groupId) {
    const g = state.groups.find(x=>x.id===selTr.groupId);
    if (g) {
      poolAthletes = g.athleteIds.map(id=>state.athletes.find(a=>a.id===id)).filter(Boolean);
      poolLabel    = g.name;
      poolColor    = groupColor(g.colorId);
    }
  }

  // ── Trainings-Auswahl Kacheln ──
  const wrapper = document.createElement('div');

  // Header mit Kontext-Info
  wrapper.innerHTML = `
    <div class="card" style="padding:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div>
          <div style="font-size:17px;font-weight:900">Gruppenstatistik</div>
          <div style="font-size:12px;color:#94a3b8;margin-top:2px">
            ${selTr
              ? `${poolAthletes.length} Athleten · ${esc(selTr.tplName)} · ${fmtDate(selTr.date)}`
              : `Alle Trainings der letzten ${_statsPeriod} Tage`}
          </div>
        </div>
        ${poolColor ? `<div style="display:flex;align-items:center;gap:6px;background:${poolColor.hex}18;border:1.5px solid ${poolColor.hex}50;padding:5px 12px;border-radius:999px">
          <div style="width:8px;height:8px;border-radius:50%;background:${poolColor.hex}"></div>
          <span style="font-size:12px;font-weight:800;color:${poolColor.hex}">${esc(poolLabel)}</span>
        </div>` : ''}
      </div>

      <!-- Training Kacheln -->
      <div style="font-size:11px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">
        Training auswählen
      </div>
      <div class="grpstat-session-grid">
        <!-- Alle-Kachel -->
        <div class="grpstat-session-card ${!_grpStatTrId?'selected':''}" data-grpstat-tr="">
          <div class="grpstat-session-name">Alle anzeigen</div>
          <div class="grpstat-session-date">${allShown.length} Trainings</div>
          <div class="grpstat-session-grp" style="background:#1e293b18">
            <span style="font-size:10px;font-weight:800;color:#1e293b">Gesamt</span>
          </div>
        </div>
        ${allShown.slice(0,9).map(t => {
          const g = t.groupId ? state.groups.find(x=>x.id===t.groupId) : null;
          const col = g ? groupColor(g.colorId) : null;
          return `<div class="grpstat-session-card ${_grpStatTrId===t.id?'selected':''}" data-grpstat-tr="${t.id}">
            <div class="grpstat-session-name">${esc(t.tplName)}</div>
            <div class="grpstat-session-date">${fmtDate(t.date)}</div>
            ${g ? `<div class="grpstat-session-grp" style="background:${col.hex}18;border:1px solid ${col.hex}40">
              <div style="width:6px;height:6px;border-radius:50%;background:${col.hex};flex-shrink:0"></div>
              <span style="font-size:10px;font-weight:800;color:${col.hex}">${esc(g.name)}</span>
            </div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;

  // Training-Kachel Klick-Handler
  wrapper.querySelectorAll('[data-grpstat-tr]').forEach(card => {
    card.onclick = () => {
      _grpStatTrId = card.getAttribute('data-grpstat-tr');
      renderGroupStats(host, cutoff);
    };
  });
  host.appendChild(wrapper);

  // ── Leaderboard ──
  const lbDiv = document.createElement('div');
  host.appendChild(lbDiv);

  // Leaderboard berechnen: Trainingsanzahl der Pool-Athleten
  // Wenn Training gewählt → nur dieses Training; sonst alle im Zeitraum
  const trainingsForLb = selTr ? [selTr] : allShown;
  const ranked = poolAthletes.map(ath => {
    let sessionCount = 0;
    trainingsForLb.forEach(tr => {
      const hasData = tr.exercises?.some(ex => (tr.records?.[`${ath.id}_${ex.id}`]||[]).length > 0);
      if (hasData) sessionCount++;
    });
    return { ath, sessionCount };
  }).filter(x => x.sessionCount > 0).sort((a,b) => b.sessionCount - a.sessionCount);

  if (!ranked.length) {
    lbDiv.innerHTML = `<div class="leaderboard-wrap">
      <div class="leaderboard-title" style="font-size:18px">Leaderboard</div>
      <div class="stats-empty" style="padding:30px 0">
        <div class="stats-empty-icon">🏆</div>
        <div class="stats-empty-title" style="font-size:18px">Noch keine Einträge</div>
        <div class="stats-empty-sub">Erfasse Trainings um das Leaderboard zu füllen</div>
      </div>
    </div>`;
  } else {
    const lbTitle = selTr
      ? `Leaderboard · ${esc(selTr.tplName)}`
      : `Leaderboard · ${_statsPeriod} Tage`;

    const podiumHtml = [
      _podiumCard(ranked[1]||null, 'silver'),
      _podiumCard(ranked[0]||null, 'gold'),
      _podiumCard(ranked[2]||null, 'bronze'),
    ].join('');

    const listHtml = ranked.slice(3).map((entry,idx) => {
      const thumb = _imgCache.get(entry.ath.photoId);
      return `<div class="lb-list-item">
        <div class="lb-list-rank">${idx+4}</div>
        <div class="lb-list-ava-wrap">
          ${thumb?`<img class="lb-list-ava" src="${thumb}"/>`:`<div class="lb-list-sil"></div>`}
        </div>
        <div class="lb-list-name">${esc(entry.ath.name)}</div>
        <div class="lb-list-val">${entry.sessionCount} Tr.</div>
      </div>`;
    }).join('');

    lbDiv.innerHTML = `<div class="leaderboard-wrap">
      <div class="leaderboard-title" style="font-size:18px">${lbTitle}</div>
      <div class="lb-podium">${podiumHtml}</div>
      ${listHtml}
    </div>`;
  }

  // ── Übungsstatistik der Gruppe ──
  // Alle Übungen aus den relevanten Trainings sammeln
  const exStats = {}; // exTitle → { athletes: { athId → { best, avg, vals[] } } }
  const trsForEx = selTr ? [selTr] : allShown;

  trsForEx.forEach(tr => {
    tr.exercises?.forEach(ex => {
      if (!ex?.title) return;
      poolAthletes.forEach(ath => {
        const recs = tr.records?.[`${ath.id}_${ex.id}`] || [];
        recs.forEach(r => {
          let v = 0;
          if (ex.type==='lr') v = (parseFloat(r.left)||0)+(parseFloat(r.right)||0);
          else v = parseFloat(r.value)||0;
          if (!v) return;
          if (!exStats[ex.title]) exStats[ex.title] = { type: ex.type, athletes: {} };
          if (!exStats[ex.title].athletes[ath.id]) exStats[ex.title].athletes[ath.id] = { ath, vals: [] };
          exStats[ex.title].athletes[ath.id].vals.push(v);
        });
      });
    });
  });

  const exTitles = Object.keys(exStats);
  if (!exTitles.length) return;

  const exSection = document.createElement('div');
  let exHtml = `<div style="font-size:11px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin:4px 0 12px">Übungsvergleich</div>`;

  exTitles.forEach(exTitle => {
    const ex = exStats[exTitle];
    const timeDir = ex.type==='time' ? getTimeDirByTitle(exTitle) : 'desc';

    // Alle Athleten mit Werten — sortiert nach timeDir
    const athRows = Object.values(ex.athletes).map(({ ath, vals }) => ({
      ath,
      best: bestVal(vals, timeDir),
      avg:  Math.round((vals.reduce((a,b)=>a+b,0)/vals.length)*10)/10,
      count: vals.length,
    }));
    const sorted = sortByBest(athRows, timeDir);

    if (!sorted.length) return;
    const maxVal = sorted[0].best; // nach Sortierung ist Bester vorne

    const dirLabel = ex.type==='time'
      ? `<span style="font-size:10px;color:#94a3b8;margin-left:6px;font-weight:600">${timeDir==='asc'?'🏃 kürzer=besser':'🏅 länger=besser'}</span>`
      : '';

    exHtml += `<div class="grpstat-ex-card">
      <div class="grpstat-ex-title">
        <span>💪</span> ${esc(exTitle)} ${dirLabel}
        <span style="margin-left:auto;font-size:12px;font-weight:600;color:#94a3b8">${sorted.length} Athleten</span>
      </div>
      ${sorted.map((row, idx) => {
        const thumb = _imgCache.get(row.ath.photoId) || row.ath.photo || DEFAULT_AVATAR;
        // Balken: bei asc → Bester hat kleinsten Wert; Balken relativ zum schlechtesten
        const worstVal = sorted[sorted.length-1].best;
        const range    = Math.abs(worstVal - maxVal) || 1;
        const pct = timeDir==='asc'
          ? Math.round(((worstVal - row.best) / range) * 100)  // kleinster = voller Balken
          : Math.round((row.best / (maxVal || 1)) * 100);
        const isTop = idx === 0;
        return `<div class="grpstat-ath-row">
          <div class="grpstat-rank">${idx+1}</div>
          <img class="grpstat-ath-ava" src="${thumb}" data-lazy-grpex="${row.ath.photoId||''}"/>
          <div class="grpstat-ath-name">${esc(row.ath.name)}</div>
          <div class="grpstat-bar-wrap">
            <div class="grpstat-bar-fill ${isTop?'rank1':''}" style="width:${Math.min(100,Math.max(8,pct))}%"></div>
          </div>
          <div class="grpstat-val">${row.best?.toFixed(2) ?? '-'}</div>
        </div>`;
      }).join('')}
    </div>`;
  });

  exSection.innerHTML = exHtml;
  host.appendChild(exSection);

  // Lazy-load Gruppenstatistik-Avatare
  exSection.querySelectorAll('[data-lazy-grpex]').forEach(async img => {
    const id = img.getAttribute('data-lazy-grpex');
    if (id && !_imgCache.has(id)) { const src = await cachedThumb(id); if(src) img.src=src; }
  });
}
